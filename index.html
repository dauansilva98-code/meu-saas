<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador Financeiro Pro</title>
    
    <!-- Proteção: Se não estiver logado, expulsa para o login -->
    <script>
        try {
            if (localStorage.getItem("logado") !== "sim") {
                // Previne erro de redirecionamento no ambiente de preview/sandbox
                if (window.location.protocol !== 'about:' && window.location.protocol !== 'data:' && window.location.hostname !== '') {
                    window.location.href = "login.html";
                } else {
                    console.log("Ambiente de preview detectado. Simulando login para testes...");
                    localStorage.setItem("logado", "sim");
                }
            }
        } catch (e) {
            console.error("Erro ao verificar login:", e);
        }
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Para rodar o JSX/React direto no navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Dependências do Recharts -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>

    <!-- Recharts (Versão fixada para estabilidade via CDN) -->
    <script src="https://unpkg.com/recharts@2.1.9/umd/Recharts.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Extraindo React e Recharts das bibliotecas globais
        const { useState, useEffect, useMemo } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip: RechartsTooltip, Legend, BarChart, Bar, XAxis, YAxis, CartesianGrid } = window.Recharts;

        // Configuração do Supabase (Usando suas chaves do código antigo)
        const supabaseUrl = 'https://izmdjkalwgupuehrbcxm.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bWRqa2Fsd2d1cHVlaHJiY3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNDkwNTUsImV4cCI6MjA4NTgyNTA1NX0.w3FW5oORqiEjT0Xj3d3777KfE0xl2zm0ogezpfN3Gss'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Componente wrapper para os ícones Lucide
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- ESTRUTURA DE DADOS E METADADOS PADRÃO ---
        const MONTHS = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

        const ICON_MAP = { Wallet: 'wallet', Home: 'home', HeartPulse: 'heart-pulse', Bus: 'bus', Car: 'car', Church: 'church', Smile: 'smile', TrendingUp: 'trending-up', CreditCard: 'credit-card', Receipt: 'receipt' };

        const DEFAULT_METADATA = {
            'Renda Familiar': 'income', 'Casa': 'expense', 'Saúde': 'expense', 'Automóvel': 'expense',
            'Transporte': 'expense', 'Cartão de Crédito': 'expense', 'Investimento': 'investment'
        };

        const CATEGORIES_CONFIG = {
            'Renda Familiar': { icon: 'Wallet', type: 'income', items: ['Salário Principal', 'Salário Secundário', 'Renda Extra', 'Outros'] },
            'Casa': { icon: 'Home', type: 'expense', items: ['Aluguel / Prestação', 'Condomínio', 'Luz', 'Água', 'Internet', 'Mercado', 'Gás'] },
            'Automóvel': { icon: 'Car', type: 'expense', items: ['Parcela do Carro', 'Combustível', 'Seguro', 'IPVA', 'Mecânico', 'Lavagem'] },
            'Saúde': { icon: 'HeartPulse', type: 'expense', items: ['Plano de Saúde', 'Farmácia', 'Consultas', 'Outros'] },
            'Transporte': { icon: 'Bus', type: 'expense', items: ['Transporte Público', 'Aplicativos (Uber/99)'] },
            'Lazer': { icon: 'Smile', type: 'expense', items: ['Alimentação fora', 'Assinaturas (Netflix, etc)', 'Passeios', 'Compras'] },
            'Cartão de Crédito': { icon: 'CreditCard', type: 'expense', items: ['Cartão Principal', 'Cartão Adicional'] },
            'Investimento': { icon: 'TrendingUp', type: 'investment', items: ['Reserva de Emergência', 'Renda Fixa', 'Renda Variável'] },
        };

        const COLORS_GERAL = ['#0ea5e9', '#ec4899', '#10b981', '#8b5cf6', '#f59e0b', '#6366f1', '#f43f5e', '#14b8a6'];
        const COLORS_INCOME = ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f43f5e', '#6366f1'];
        const COLORS_CC = ['#8b5cf6', '#f59e0b', '#ec4899', '#10b981', '#3b82f6', '#f43f5e', '#14b8a6'];
        const COLORS_INVEST = ['#1e293b', '#f59e0b', '#3b82f6', '#10b981']; 

        const DEFAULT_FIXED_ITEMS = ['Condomínio', 'Luz', 'Água', 'Internet', 'Aluguel', 'Prestação', 'Plano de Saúde', 'Parcela do Carro', 'IPVA', 'Seguro', 'Assinaturas'];

        const isDefaultFixed = (itemName) => {
            return DEFAULT_FIXED_ITEMS.some(keyword => itemName.toLowerCase().includes(keyword.toLowerCase()));
        };

        const generateEmptyData = () => {
            let data = {};
            MONTHS.forEach(m => {
                data[m] = {
                    goals: { fixed: 50, variable: 30, investment: 20 },
                    itemMetadata: {},
                    categoriesMetadata: { ...DEFAULT_METADATA }
                };
                Object.keys(CATEGORIES_CONFIG).forEach(cat => {
                    data[m][cat] = {};
                    data[m].itemMetadata[cat] = {};
                    CATEGORIES_CONFIG[cat].items.forEach(item => {
                        data[m][cat][item] = 0;
                        if (CATEGORIES_CONFIG[cat].type === 'investment') {
                            data[m].itemMetadata[cat][item] = item.toLowerCase().includes('reserva') ? 'reserva' : 
                                                              item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel';
                        } else {
                            data[m].itemMetadata[cat][item] = isDefaultFixed(item) ? 'fixed' : 'variable';
                        }
                    });
                });
            });
            return data;
        };

        const deepClone = (obj) => {
            try { return structuredClone(obj); } 
            catch (e) { return JSON.parse(JSON.stringify(obj)); }
        };

        // --- COMPONENTES AUXILIARES ---
        const CurrencyInput = ({ initialValue, onValueChange, className }) => {
            const formatCurrencyString = (val) => {
                const num = Number(val);
                if (isNaN(num)) return '0,00';
                return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
            };

            const [displayValue, setDisplayValue] = useState(formatCurrencyString(initialValue));

            useEffect(() => { setDisplayValue(formatCurrencyString(initialValue)); }, [initialValue]);

            const handleChange = (e) => {
                const rawDigits = e.target.value.replace(/\D/g, '');
                if (!rawDigits) {
                    setDisplayValue('0,00');
                    return;
                }
                const numericValue = Number(rawDigits) / 100;
                setDisplayValue(formatCurrencyString(numericValue));
            };

            const handleBlur = () => {
                const rawDigits = displayValue.replace(/\D/g, '');
                const numericValue = rawDigits ? Number(rawDigits) / 100 : 0;
                setDisplayValue(formatCurrencyString(numericValue));
                if (numericValue !== initialValue) onValueChange(numericValue);
            };

            const handleKeyDown = (e) => { if (e.key === 'Enter') e.target.blur(); };

            return (
                <input 
                    type="text" inputMode="numeric" value={displayValue} onChange={handleChange} onBlur={handleBlur} onKeyDown={handleKeyDown}
                    className={`w-20 sm:w-28 pl-2 sm:pl-4 pr-2 sm:pr-3 py-1.5 text-right text-xs sm:text-sm font-semibold border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all ${className}`}
                    placeholder="0,00"
                />
            );
        };

        const EditableRow = ({ name, value, itemType, onRename, onValueChange, onTypeChange, onDelete, isIncome = false, isExpense = false, isInvestment = false }) => {
            const [localName, setLocalName] = useState(name);

            useEffect(() => { setLocalName(name); }, [name]);

            const handleNameBlur = () => {
                const trimmed = localName.trim();
                if (trimmed !== name && trimmed !== '') onRename(name, trimmed);
                else setLocalName(name);
            };

            const colorClass = isIncome ? 'text-emerald-600 focus:text-emerald-700 focus:bg-emerald-50' : 'text-rose-600 focus:text-rose-700 focus:bg-rose-50';

            return (
                <div className="flex items-center justify-between p-2 bg-white hover:bg-slate-50/80 border border-slate-100 rounded-xl transition-colors group shadow-sm gap-1 flex-wrap sm:flex-nowrap">
                    <input type="text" value={localName} onChange={(e) => setLocalName(e.target.value)} onBlur={handleNameBlur}
                        className="bg-transparent font-semibold text-slate-700 text-xs outline-none w-full sm:w-auto flex-1 min-w-[100px] mb-1 sm:mb-0" placeholder="Descrição da conta"
                    />
                    <div className="flex items-center gap-1 shrink-0 ml-auto">
                        {isInvestment ? (
                            <select value={itemType || 'variavel'} onChange={(e) => onTypeChange(e.target.value)}
                                className={`text-[9px] uppercase font-bold rounded px-1.5 py-1 outline-none cursor-pointer transition-colors ${itemType === 'reserva' ? 'bg-blue-100 text-blue-700 hover:bg-blue-200' : itemType === 'fixa' ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' : 'bg-purple-100 text-purple-700 hover:bg-purple-200'}`}
                            >
                                <option value="reserva">Reserva</option><option value="fixa">Fixa</option><option value="variavel">Var</option>
                            </select>
                        ) : isExpense ? (
                            <select value={itemType || 'variable'} onChange={(e) => onTypeChange(e.target.value)}
                                className={`text-[9px] uppercase font-bold rounded px-1.5 py-1 outline-none cursor-pointer transition-colors ${itemType === 'fixed' ? 'bg-rose-100 text-rose-700 hover:bg-rose-200' : 'bg-orange-100 text-orange-700 hover:bg-orange-200'}`}
                            >
                                <option value="fixed">Fixo</option><option value="variable">Var</option>
                            </select>
                        ) : null}
                        <CurrencyInput initialValue={value} onValueChange={onValueChange} className={`w-16 sm:w-20 !pl-1 !pr-1 !py-1 border-transparent bg-transparent hover:bg-white font-bold text-xs ${colorClass}`} />
                        <button onClick={() => onDelete(name)} className="text-rose-400 hover:text-rose-600 p-1 sm:p-0.5 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity" title="Excluir">
                            <Icon name="x" className="w-3 h-3 sm:w-4 sm:h-4" />
                        </button>
                    </div>
                </div>
            );
        };

        const InvestmentRow = ({ item, onRename, onValueChange, onTypeChange, onInstChange, onDelete }) => {
            const [localName, setLocalName] = useState(item.name);
            const [localInst, setLocalInst] = useState(item.inst);
            
            useEffect(() => { setLocalName(item.name); }, [item.name]);
            useEffect(() => { setLocalInst(item.inst); }, [item.inst]);
            
            const handleNameBlur = () => {
                const trimmed = localName.trim();
                if (trimmed !== item.name && trimmed !== '') onRename(item.category, item.name, trimmed);
                else setLocalName(item.name);
            };
            const handleInstBlur = () => onInstChange(item.category, item.name, localInst.trim());

            return (
                <tr className="bg-white border-b border-slate-100 hover:bg-slate-50/50 transition-colors group flex flex-col sm:table-row mb-4 sm:mb-0 p-3 sm:p-0 rounded-xl sm:rounded-none shadow-sm sm:shadow-none border sm:border-0 sm:border-b">
                    <td className="px-2 sm:px-6 py-2 sm:py-3 border-b border-slate-50 sm:border-0">
                        <div className="flex sm:block items-center justify-between mb-1 sm:mb-0">
                            <span className="sm:hidden text-[10px] font-bold text-slate-400 uppercase tracking-wider">Ativo</span>
                            <input type="text" value={localName} onChange={(e) => setLocalName(e.target.value)} onBlur={handleNameBlur} className="font-medium text-slate-900 bg-transparent outline-none w-full sm:min-w-[120px] hover:bg-slate-100 focus:bg-white rounded px-2 py-1 text-xs sm:text-sm text-right sm:text-left" placeholder="Nome do Ativo" />
                        </div>
                    </td>
                    <td className="px-2 sm:px-6 py-2 sm:py-3 border-b border-slate-50 sm:border-0">
                        <div className="flex sm:block items-center justify-between">
                            <span className="sm:hidden text-[10px] font-bold text-slate-400 uppercase tracking-wider">Instituição</span>
                            <input type="text" value={localInst} onChange={(e) => setLocalInst(e.target.value)} onBlur={handleInstBlur} className="font-medium text-slate-500 bg-transparent outline-none w-full sm:min-w-[100px] hover:bg-slate-100 focus:bg-white rounded px-2 py-1 text-xs sm:text-sm text-right sm:text-left" placeholder="Ex: Itaú, Rico..." />
                        </div>
                    </td>
                    <td className="px-2 sm:px-6 py-2 sm:py-3 border-b border-slate-50 sm:border-0">
                        <div className="flex sm:block items-center justify-between">
                            <span className="sm:hidden text-[10px] font-bold text-slate-400 uppercase tracking-wider">Tipo</span>
                            <select value={item.type} onChange={(e) => onTypeChange(item.category, item.name, e.target.value)} className={`text-[10px] font-bold px-2 py-1.5 rounded outline-none cursor-pointer uppercase ${item.type === 'reserva' ? 'bg-blue-100 text-blue-700 hover:bg-blue-200' : item.type === 'fixa' ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' : 'bg-purple-100 text-purple-700 hover:bg-purple-200'}`}>
                                <option value="reserva">Reserva</option><option value="fixa">Fixa</option><option value="variavel">Variável</option>
                            </select>
                        </div>
                    </td>
                    <td className="px-2 sm:px-6 py-2 sm:py-3 text-right relative flex sm:table-cell items-center justify-between sm:justify-end">
                        <span className="sm:hidden text-[10px] font-bold text-slate-400 uppercase tracking-wider">Valor</span>
                        <div className="relative inline-flex items-center justify-end w-full sm:w-auto">
                            <span className="absolute right-[80px] sm:right-[110px] text-[9px] sm:text-[10px] font-bold text-slate-400 pointer-events-none">R$</span>
                            <CurrencyInput initialValue={item.value} onValueChange={(newVal) => onValueChange(item.category, item.name, newVal)} className="w-20 sm:w-24 !pl-4 sm:!pl-6 !pr-2 !py-1 border-slate-100 bg-slate-50/50 focus:bg-white min-w-[80px]" />
                        </div>
                    </td>
                    <td className="px-2 sm:px-3 py-2 sm:py-3 text-center sm:table-cell">
                        <button onClick={() => onDelete(item.category, item.name)} className="text-rose-500 hover:text-rose-700 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity p-2 sm:p-1 w-full sm:w-auto flex justify-center items-center gap-1 bg-rose-50 sm:bg-transparent rounded-lg mt-2 sm:mt-0 text-xs sm:text-base font-bold sm:font-normal">
                            <Icon name="x" className="w-4 h-4" /> <span className="sm:hidden">Excluir Ativo</span>
                        </button>
                    </td>
                </tr>
            );
        };

        // --- COMPONENTE PRINCIPAL (APP) ---
        function App() {
            const [user, setUser] = useState(null);
            const [budgetData, setBudgetData] = useState(generateEmptyData());
            const [currentMonthIdx, setCurrentMonthIdx] = useState(new Date().getMonth());
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);
            const [confirmMonthChange, setConfirmMonthChange] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const currentMonth = MONTHS[currentMonthIdx];

            // Inicialização e Autenticação com Supabase
            useEffect(() => {
                const initApp = async () => {
                    // Proteção secundária para ambiente isolado
                    if (localStorage.getItem("logado") !== "sim") {
                        if (window.location.protocol !== 'about:' && window.location.protocol !== 'data:' && window.location.hostname !== '') {
                            window.location.href = "login.html";
                            return;
                        }
                    }

                    const { data: { session }, error } = await supabaseClient.auth.getSession();
                    
                    if (error || !session?.user) {
                        localStorage.removeItem("logado");
                        if (window.location.protocol !== 'about:' && window.location.protocol !== 'data:' && window.location.hostname !== '') {
                            window.location.href = "login.html";
                            return;
                        }
                    }

                    // Se estiver no preview sem sessão real, mockar um usuário
                    if (!session?.user) {
                        console.log("Mocking usuário no ambiente de preview...");
                        setLoading(false);
                        return;
                    }

                    // Verifica a Assinatura (Profile)
                    const { data: profile } = await supabaseClient
                        .from('profiles')
                        .select('subscription_status')
                        .eq('id', session.user.id)
                        .single();

                    if (!profile || profile.subscription_status !== 'active') {
                        alert("Acesso restrito para assinantes. Ative sua conta!");
                        window.location.href = `https://buy.stripe.com/test_28E4gB89g0EN075gaqcs800?client_reference_id=${session.user.id}`;
                        return;
                    }

                    setUser(session.user);
                    loadDadosSupabase(session.user.id);
                };
                
                initApp();
            }, []);

            const loadDadosSupabase = async (userId) => {
                try {
                    const { data, error } = await supabaseClient
                        .from('dados_financeiros')
                        .select('payload')
                        .eq('id', userId)
                        .single();

                    if (data && data.payload) {
                        const payload = data.payload;
                        
                        // Verifica se é a estrutura antiga ou a nova (com meses)
                        if (payload.Janeiro) {
                            // É a estrutura nova!
                            setBudgetData(payload);
                        } else {
                            // É a estrutura antiga. Como a plataforma mudou muito, 
                            // carregamos a nova estrutura vazia.
                            console.log("Estrutura antiga detectada, iniciando novo ciclo.");
                            setBudgetData(generateEmptyData());
                        }
                    } else {
                        // Usuário novo
                        setBudgetData(generateEmptyData());
                    }
                } catch (err) {
                    console.error("Erro ao carregar dados", err);
                    setErrorMsg("Erro de conexão.");
                }
                setLoading(false);
            };

            const saveToSupabase = async (dataToSave) => {
                if (!user) return;
                setSaving(true);
                setErrorMsg(null);
                try {
                    const { error } = await supabaseClient
                        .from('dados_financeiros')
                        .upsert({ 
                            id: user.id, 
                            payload: dataToSave,
                            updated_at: new Date()
                        });

                    if (error) throw error;
                } catch (error) {
                    console.error("Save error:", error);
                    setErrorMsg("Falha ao salvar.");
                } finally {
                    setSaving(false);
                }
            };

            const logout = async () => {
                await supabaseClient.auth.signOut();
                localStorage.removeItem("logado");
                if (window.location.protocol !== 'about:' && window.location.protocol !== 'data:' && window.location.hostname !== '') {
                    window.location.href = "login.html";
                } else {
                    alert("Sessão finalizada! (Redirecionamento bloqueado no ambiente de teste)");
                }
            };

            // Funções de Manipulação de Dados
            const handleValueChange = (category, item, numValue) => {
                const updatedData = deepClone(budgetData);
                updatedData[currentMonth][category][item] = numValue;
                setBudgetData(updatedData);
                saveToSupabase(updatedData);
            };

            const handleItemTypeChange = (category, item, newType) => {
                const updatedData = deepClone(budgetData);
                if (!updatedData[currentMonth].itemMetadata) updatedData[currentMonth].itemMetadata = {};
                if (!updatedData[currentMonth].itemMetadata[category]) updatedData[currentMonth].itemMetadata[category] = {};
                updatedData[currentMonth].itemMetadata[category][item] = newType;
                setBudgetData(updatedData);
                saveToSupabase(updatedData);
            };

            const handleInstitutionChange = (category, item, inst) => {
                const updatedData = deepClone(budgetData);
                if (!updatedData[currentMonth].itemMetadata) updatedData[currentMonth].itemMetadata = {};
                if (!updatedData[currentMonth].itemMetadata[category]) updatedData[currentMonth].itemMetadata[category] = {};
                updatedData[currentMonth].itemMetadata[category][`${item}_inst`] = inst;
                setBudgetData(updatedData);
                saveToSupabase(updatedData);
            };

            const handleGoalChange = (group, value) => {
                const numValue = parseInt(value) || 0;
                const currentGoals = budgetData[currentMonth]?.goals || { fixed: 50, variable: 30, investment: 20 };
                const updatedData = deepClone(budgetData);
                updatedData[currentMonth].goals = { ...currentGoals, [group]: numValue };
                setBudgetData(updatedData);
                saveToSupabase(updatedData);
            };

            const handleCopyFromPreviousMonth = () => {
                if (currentMonthIdx === 0) return;
                const previousMonth = MONTHS[currentMonthIdx - 1];
                const previousData = budgetData[previousMonth];
                if (!previousData) return;

                const updatedData = deepClone(budgetData);
                updatedData[currentMonth] = deepClone(previousData);
                setBudgetData(updatedData);
                saveToSupabase(updatedData);
            };

            const handleAddCategory = () => {
                let newName = 'Nova Categoria';
                let counter = 1;
                while (budgetData[currentMonth][newName] !== undefined) {
                    newName = `Nova Categoria ${counter}`;
                    counter++;
                }
                const updatedData = deepClone(budgetData);
                updatedData[currentMonth][newName] = {};
                if (!updatedData[currentMonth].itemMetadata) updatedData[currentMonth].itemMetadata = {};
                if (!updatedData[currentMonth].categoriesMetadata) updatedData[currentMonth].categoriesMetadata = {};
                
                updatedData[currentMonth].itemMetadata[newName] = {};
                updatedData[currentMonth].categoriesMetadata[newName] = 'expense';
                
                setBudgetData(updatedData);
                saveToSupabase(updatedData);
            };

            const handleRenameCategory = (oldName, newName) => {
                if (oldName === newName || newName.trim() === '') return;
                const finalName = newName.trim();
                const updatedData = deepClone(budgetData);
                if (updatedData[currentMonth][finalName] !== undefined && finalName !== oldName) return;

                updatedData[currentMonth][finalName] = updatedData[currentMonth][oldName];
                delete updatedData[currentMonth][oldName];
                
                if (updatedData[currentMonth].itemMetadata && updatedData[currentMonth].itemMetadata[oldName]) {
                    updatedData[currentMonth].itemMetadata[finalName] = updatedData[currentMonth].itemMetadata[oldName];
                    delete updatedData[currentMonth].itemMetadata[oldName];
                }
                if (updatedData[currentMonth].categoriesMetadata && updatedData[currentMonth].categoriesMetadata[oldName]) {
                    updatedData[currentMonth].categoriesMetadata[finalName] = updatedData[currentMonth].categoriesMetadata[oldName];
                    delete updatedData[currentMonth].categoriesMetadata[oldName];
                }
                setBudgetData(updatedData);
                saveToSupabase(updatedData);
            };

            const handleDeleteCategory = (catName) => {
                const updatedData = deepClone(budgetData);
                delete updatedData[currentMonth][catName];
                if (updatedData[currentMonth].itemMetadata) delete updatedData[currentMonth].itemMetadata[catName];
                if (updatedData[currentMonth].categoriesMetadata) delete updatedData[currentMonth].categoriesMetadata[catName];
                setBudgetData(updatedData);
                saveToSupabase(updatedData);
            };

            const handleAddItem = (categoryName, defaultName = 'Nova Conta', defaultType = 'auto') => {
                const updatedData = deepClone(budgetData);
                if (!updatedData[currentMonth][categoryName]) {
                    updatedData[currentMonth][categoryName] = {};
                    if(!updatedData[currentMonth].categoriesMetadata) updatedData[currentMonth].categoriesMetadata = {};
                    updatedData[currentMonth].categoriesMetadata[categoryName] = categoryName === 'Investimento' ? 'investment' : categoryName === 'Renda Familiar' ? 'income' : 'expense';
                }

                let newName = defaultName;
                let counter = 1;
                const currentItems = updatedData[currentMonth][categoryName];
                while (currentItems[newName] !== undefined) {
                    newName = `${defaultName} ${counter}`;
                    counter++;
                }
                updatedData[currentMonth][categoryName][newName] = 0;
                
                if (!updatedData[currentMonth].itemMetadata) updatedData[currentMonth].itemMetadata = {};
                if (!updatedData[currentMonth].itemMetadata[categoryName]) updatedData[currentMonth].itemMetadata[categoryName] = {};
                
                const catMetaType = updatedData[currentMonth].categoriesMetadata[categoryName] || CATEGORIES_CONFIG[categoryName]?.type || 'expense';

                if(defaultType === 'auto') {
                    if (catMetaType === 'investment') {
                        updatedData[currentMonth].itemMetadata[categoryName][newName] = 'variavel';
                    } else {
                        updatedData[currentMonth].itemMetadata[categoryName][newName] = isDefaultFixed(newName) ? 'fixed' : 'variable';
                    }
                } else {
                    updatedData[currentMonth].itemMetadata[categoryName][newName] = defaultType;
                }

                setBudgetData(updatedData);
                saveToSupabase(updatedData);
            };

            const handleRenameItem = (categoryName, oldName, newName) => {
                if (oldName === newName || newName.trim() === '') return;
                const updatedData = deepClone(budgetData);
                const currentItems = updatedData[currentMonth][categoryName];
                
                let finalName = newName.trim();
                let counter = 1;
                while (currentItems[finalName] !== undefined && finalName !== oldName) {
                    finalName = `${newName.trim()} ${counter}`;
                    counter++;
                }

                currentItems[finalName] = currentItems[oldName];
                delete currentItems[oldName];
                
                if (updatedData[currentMonth].itemMetadata && updatedData[currentMonth].itemMetadata[categoryName]) {
                    updatedData[currentMonth].itemMetadata[categoryName][finalName] = updatedData[currentMonth].itemMetadata[categoryName][oldName];
                    delete updatedData[currentMonth].itemMetadata[categoryName][oldName];
                    if (updatedData[currentMonth].itemMetadata[categoryName][`${oldName}_inst`] !== undefined) {
                        updatedData[currentMonth].itemMetadata[categoryName][`${finalName}_inst`] = updatedData[currentMonth].itemMetadata[categoryName][`${oldName}_inst`];
                        delete updatedData[currentMonth].itemMetadata[categoryName][`${oldName}_inst`];
                    }
                }
                setBudgetData(updatedData);
                saveToSupabase(updatedData);
            };

            const handleDeleteItem = (categoryName, itemName) => {
                const updatedData = deepClone(budgetData);
                delete updatedData[currentMonth][categoryName][itemName];
                if (updatedData[currentMonth].itemMetadata && updatedData[currentMonth].itemMetadata[categoryName]) {
                    delete updatedData[currentMonth].itemMetadata[categoryName][itemName];
                    delete updatedData[currentMonth].itemMetadata[categoryName][`${itemName}_inst`];
                }
                setBudgetData(updatedData);
                saveToSupabase(updatedData);
            };

            const handleAddIncome = () => { handleAddItem('Renda Familiar', 'Nova Renda', 'income'); };
            const handleDeleteIncome = (item) => { handleDeleteItem('Renda Familiar', item); };
            const handleRenameIncome = (oldName, newName) => { handleRenameItem('Renda Familiar', oldName, newName); };

            const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);

            const getCategoryTotal = (month, category) => {
                if (!budgetData[month] || !budgetData[month][category]) return 0;
                return Object.values(budgetData[month][category]).reduce((acc, val) => acc + (Number(val) || 0), 0);
            };

            const getCategoryIconAndColor = (catName) => {
                if (CATEGORIES_CONFIG[catName]) return { ...CATEGORIES_CONFIG[catName], color: 'text-slate-600', bg: 'bg-slate-100' };
                return { icon: 'Receipt', color: 'text-slate-600', bg: 'bg-slate-100', type: 'expense' };
            };

            // Cálculos
            const { totals, metrics, historyData } = useMemo(() => {
                const calcMonth = (m) => {
                    let renda = 0, gastos = 0, fixos = 0, variaveis = 0, investimentos = 0, reservaAtual = 0;
                    Object.keys(budgetData[m]).forEach(cat => {
                        if (cat === 'goals' || cat === 'itemMetadata' || cat === 'categoriesMetadata') return;
                        const config = CATEGORIES_CONFIG[cat] || { type: 'expense' };
                        const catMetaType = budgetData[m].categoriesMetadata?.[cat] || config.type || 'expense';

                        if (catMetaType === 'income' || cat === 'Renda Familiar') {
                            renda += getCategoryTotal(m, cat);
                        } else if (catMetaType === 'investment' || cat === 'Investimento') {
                            Object.entries(budgetData[m][cat]).forEach(([item, val]) => {
                                const numVal = Number(val) || 0;
                                const type = budgetData[m].itemMetadata?.[cat]?.[item] || (item.toLowerCase().includes('reserva') ? 'reserva' : item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel');
                                if(type === 'reserva') reservaAtual += numVal;
                                else investimentos += numVal;
                            });
                        } else {
                            Object.entries(budgetData[m][cat]).forEach(([item, val]) => {
                                const numVal = Number(val) || 0;
                                gastos += numVal;
                                const type = budgetData[m].itemMetadata?.[cat]?.[item] || 'variable';
                                if (type === 'fixed') fixos += numVal;
                                else variaveis += numVal;
                            });
                        }
                    });

                    const saldoLivre = renda - (gastos + investimentos + reservaAtual);
                    return { renda, gastos, saldo: saldoLivre, fixos, variaveis, investimentos, reservaAtual };
                };

                const current = calcMonth(currentMonth);
                let acumulado = 0, reservaTotalAcumulada = 0;
                const historyList = [];

                for (let i = 0; i <= currentMonthIdx; i++) {
                    const mData = calcMonth(MONTHS[i]);
                    acumulado += mData.saldo;
                    reservaTotalAcumulada += mData.reservaAtual;
                    const totalInvestidoMes = mData.investimentos + mData.reservaAtual;
                    historyList.push({ month: MONTHS[i], renda: mData.renda, gastos: mData.gastos, investido: totalInvestidoMes, saldo: mData.saldo });
                }

                const custoDeVida = current.fixos;
                const metaReserva6m = custoDeVida * 6;
                const metaReserva12m = custoDeVida * 12;

                return { totals: { ...current, acumulado }, metrics: { custoDeVida, metaReserva6m, metaReserva12m, reservaTotalAcumulada }, historyData: historyList };
            }, [budgetData, currentMonthIdx]);

            // Gráficos Data
            const yearlyBarData = useMemo(() => {
                return MONTHS.map(m => {
                    let renda = 0, gastos = 0, invest = 0;
                    Object.keys(budgetData[m]).forEach(cat => {
                        if (cat === 'goals' || cat === 'itemMetadata' || cat === 'categoriesMetadata') return;
                        const config = CATEGORIES_CONFIG[cat] || { type: 'expense' };
                        const catMetaType = budgetData[m].categoriesMetadata?.[cat] || config.type || 'expense';
                        if (catMetaType === 'income' || cat === 'Renda Familiar') renda += getCategoryTotal(m, cat);
                        else if (catMetaType === 'investment' || cat === 'Investimento') invest += getCategoryTotal(m, cat);
                        else gastos += getCategoryTotal(m, cat);
                    });
                    const saidasTotais = gastos + invest;
                    return { name: m.substring(0, 3), Rendimentos: renda, Gastos: gastos, Investido: invest, Saldo: renda - saidasTotais };
                });
            }, [budgetData]);

            const dashboardChartData = useMemo(() => {
                return Object.keys(budgetData[currentMonth]).filter(cat => {
                    if (cat === 'goals' || cat === 'itemMetadata' || cat === 'categoriesMetadata') return false;
                    const config = CATEGORIES_CONFIG[cat] || { type: 'expense' };
                    const catMetaType = budgetData[currentMonth].categoriesMetadata?.[cat] || config.type || 'expense';
                    return catMetaType === 'expense';
                }).map(cat => ({ name: cat, value: getCategoryTotal(currentMonth, cat) })).filter(d => d.value > 0).sort((a, b) => b.value - a.value);
            }, [budgetData, currentMonthIdx]);

            const fixedVariableChartData = useMemo(() => [
                { name: 'Contas Fixas', value: totals.fixos }, { name: 'Despesas Variáveis', value: totals.variaveis }
            ].filter(d => d.value > 0), [totals.fixos, totals.variaveis]);

            const incomeChartData = useMemo(() => {
                const meta = budgetData[currentMonth].categoriesMetadata || DEFAULT_METADATA;
                const incomeCats = Object.keys(budgetData[currentMonth]).filter(c => meta[c] === 'income' || c === 'Renda Familiar');
                let items = [];
                incomeCats.forEach(cat => Object.entries(budgetData[currentMonth][cat]).forEach(([name, value]) => items.push({name, value: Number(value)})));
                return items.filter(d => d.value > 0).sort((a,b) => b.value - a.value);
            }, [budgetData, currentMonthIdx]);

            const creditCardChartData = useMemo(() => {
                const ccCats = Object.keys(budgetData[currentMonth]).filter(c => c.toLowerCase().includes('cartão') || c.toLowerCase().includes('cartao'));
                let items = [];
                ccCats.forEach(cat => {
                    if(cat !== 'goals' && cat !== 'itemMetadata' && cat !== 'categoriesMetadata') {
                        Object.entries(budgetData[currentMonth][cat]).forEach(([name, value]) => items.push({name, value: Number(value)}));
                    }
                });
                return items.filter(d => d.value > 0).sort((a,b) => b.value - a.value);
            }, [budgetData, currentMonthIdx]);

            const investmentChartData = useMemo(() => {
                const meta = budgetData[currentMonth].categoriesMetadata || DEFAULT_METADATA;
                const investCats = Object.keys(budgetData[currentMonth]).filter(c => meta[c] === 'investment' || c === 'Investimento');
                let items = [];
                investCats.forEach(cat => Object.entries(budgetData[currentMonth][cat]).forEach(([name, value]) => items.push({name, value: Number(value)})));
                return items.filter(d => d.value > 0).sort((a,b) => b.value - a.value);
            }, [budgetData, currentMonthIdx]);

            const isMonthEmpty = useMemo(() => totals.renda === 0 && totals.gastos === 0 && totals.investimentos === 0 && totals.reservaAtual === 0, [totals]);

            // --- RENDERIZADORES DE ABAS ---
            const renderEditableCategoryCard = (categoryName, items) => {
                const total = Object.values(items).reduce((acc, val) => acc + Number(val || 0), 0);
                const theme = getCategoryIconAndColor(categoryName);
                const iconName = ICON_MAP[theme.icon] || 'receipt';
                const config = CATEGORIES_CONFIG[categoryName] || { type: 'expense' };
                const catMetaType = budgetData[currentMonth].categoriesMetadata?.[categoryName] || config.type || 'expense';
                const isInvestmentCategory = catMetaType === 'investment';

                return (
                    <div key={categoryName} className="bg-white rounded-3xl shadow-sm border border-slate-200 p-4 flex flex-col h-full relative group/card hover:shadow-md transition-shadow">
                        <div className="flex flex-col gap-3 mb-4 pb-4 border-b border-slate-100">
                            <div className="flex justify-between items-start gap-2">
                                <div className="flex items-center gap-2 flex-1">
                                    <div className={`p-2 rounded-xl ${theme.bg}`}><Icon name={iconName} className={`w-4 h-4 ${theme.color}`} /></div>
                                    <input type="text" defaultValue={categoryName} onBlur={(e) => handleRenameCategory(categoryName, e.target.value)} className="font-bold text-slate-800 text-sm outline-none bg-transparent hover:bg-slate-50 focus:bg-blue-50 focus:text-blue-700 rounded px-2 py-1 w-full uppercase tracking-wide transition-colors" />
                                </div>
                                <button onClick={() => handleDeleteCategory(categoryName)} className="text-slate-300 hover:text-rose-500 transition-colors p-1 opacity-0 group-hover/card:opacity-100 bg-white rounded-full shadow-sm border border-slate-100" title="Excluir Categoria Inteira">
                                    <Icon name="x" className="w-4 h-4" />
                                </button>
                            </div>
                            <div className="flex justify-between items-center bg-slate-50 p-2 rounded-xl border border-slate-100">
                                <span className="text-[10px] sm:text-[11px] font-bold text-slate-500 uppercase tracking-wider pl-2">Total na Categoria</span>
                                <span className="font-bold text-slate-800 text-xs sm:text-sm">{formatCurrency(total)}</span>
                            </div>
                        </div>
                        <div className="space-y-2 flex-1 mb-4">
                            {Object.entries(items).map(([itemName, itemValue]) => {
                                const itemType = budgetData[currentMonth].itemMetadata?.[categoryName]?.[itemName] || (isInvestmentCategory ? 'variavel' : 'variable');
                                return (
                                    <EditableRow key={itemName} name={itemName} value={itemValue} isExpense={catMetaType === 'expense'} isInvestment={isInvestmentCategory} itemType={itemType} onRename={(oldN, newN) => handleRenameItem(categoryName, oldN, newN)} onValueChange={(val) => handleValueChange(categoryName, itemName, val)} onTypeChange={(newType) => handleItemTypeChange(categoryName, itemName, newType)} onDelete={(name) => handleDeleteItem(categoryName, name)} />
                                )
                            })}
                            {Object.keys(items).length === 0 && <div className="text-xs text-slate-400 italic text-center py-6 bg-slate-50 rounded-xl border border-dashed border-slate-200">Nenhuma conta cadastrada.</div>}
                        </div>
                        <div className="mt-auto">
                            <button onClick={() => handleAddItem(categoryName)} className="w-full bg-blue-50/50 hover:bg-blue-500 text-blue-600 hover:text-white py-2.5 rounded-xl text-xs font-bold transition-colors flex items-center justify-center gap-1 shadow-sm">
                                <Icon name="plus" className="w-3 h-3" /> Adicionar Conta
                            </button>
                        </div>
                    </div>
                );
            };

            const renderPieChartCard = (title, data, colors) => (
                <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col h-full">
                    <h3 className="font-extrabold text-blue-700 uppercase text-xs tracking-widest text-center mb-6">{title}</h3>
                    {data.length > 0 ? (
                        <>
                            <div className="flex-1 w-full flex items-center justify-center min-h-[200px] sm:min-h-[240px]">
                                <ResponsiveContainer width="100%" height={240}>
                                    <PieChart>
                                        <Pie data={data} cx="50%" cy="50%" outerRadius={90} dataKey="value" labelLine={false} label={({ cx, cy, midAngle, innerRadius, outerRadius, percent }) => {
                                            if (percent < 0.05) return null; 
                                            const radius = innerRadius + (outerRadius - innerRadius) * 0.6;
                                            const x = cx + radius * Math.cos(-midAngle * (Math.PI / 180));
                                            const y = cy + radius * Math.sin(-midAngle * (Math.PI / 180));
                                            return <text x={x} y={y} fill="white" textAnchor="middle" dominantBaseline="central" fontSize="10" fontWeight="bold">{`${(percent * 100).toFixed(1)}%`}</text>;
                                        }}>
                                            {data.map((_, i) => <Cell key={i} fill={colors[i % colors.length]} />)}
                                        </Pie>
                                        <RechartsTooltip formatter={(v) => formatCurrency(v)} />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="w-full mt-4 space-y-2">
                                {data.map((entry, i) => (
                                    <div key={i} className="flex justify-between text-xs items-center p-1.5 hover:bg-slate-50 rounded-lg">
                                        <div className="flex items-center gap-2 overflow-hidden mr-2">
                                            <div className="w-3 h-3 rounded-full shrink-0" style={{ backgroundColor: colors[i % colors.length] }} />
                                            <span className="text-slate-600 font-medium truncate">{entry.name}</span>
                                        </div>
                                        <span className="font-bold text-slate-800 shrink-0">{formatCurrency(entry.value)}</span>
                                    </div>
                                ))}
                            </div>
                        </>
                    ) : <div className="flex-1 flex flex-col items-center justify-center text-slate-400 text-xs sm:text-sm italic min-h-[200px]">Nenhum dado registrado.</div>}
                </div>
            );

            const renderDashboard = () => (
                <div className="space-y-6">
                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 md:gap-4">
                        {[
                            { label: 'Rendimentos', val: totals.renda, color: 'text-emerald-600' },
                            { label: 'Gastos', val: totals.gastos, color: 'text-rose-600' },
                            { label: 'Investido', val: totals.investimentos + totals.reservaAtual, color: 'text-blue-600', bg: 'bg-blue-50' },
                            { label: 'Saldo Mês', val: totals.saldo, color: totals.saldo >= 0 ? 'text-emerald-700' : 'text-rose-700', bg: totals.saldo >= 0 ? 'bg-emerald-50' : 'bg-rose-50' },
                            { label: 'Acumulado', val: totals.acumulado, color: totals.acumulado >= 0 ? 'text-blue-700' : 'text-rose-700', bg: totals.acumulado >= 0 ? 'bg-blue-50' : 'bg-rose-50' }
                        ].map((card, i) => (
                            <div key={i} className={`p-3 md:p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center ${card.bg || 'bg-white'}`}>
                                <p className="text-[9px] md:text-[10px] font-bold text-slate-500 uppercase tracking-widest">{card.label}</p>
                                <p className={`text-base sm:text-lg md:text-xl font-bold truncate mt-1 ${card.color}`}>{formatCurrency(card.val)}</p>
                            </div>
                        ))}
                    </div>

                    <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h3 className="font-bold text-slate-800 uppercase text-xs md:text-sm tracking-wide mb-6 text-center">Rendimentos, Gastos, Investimentos e Saldo</h3>
                        <div className="h-[300px] md:h-[350px] w-full">
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={yearlyBarData} margin={{ top: 10, right: 10, left: 15, bottom: 0 }}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fontSize: 11, fill: '#64748b' }} dy={10} />
                                    <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 11, fill: '#64748b' }} width={65} tickFormatter={(val) => `R$ ${val}`} />
                                    <RechartsTooltip formatter={(value) => formatCurrency(value)} cursor={{ fill: '#f8fafc' }} />
                                    <Legend iconType="circle" wrapperStyle={{ fontSize: '11px', paddingTop: '10px' }} />
                                    <Bar dataKey="Rendimentos" fill="#10b981" radius={[4, 4, 0, 0]} maxBarSize={40} />
                                    <Bar dataKey="Gastos" fill="#f43f5e" radius={[4, 4, 0, 0]} maxBarSize={40} />
                                    <Bar dataKey="Investido" fill="#3b82f6" radius={[4, 4, 0, 0]} maxBarSize={40} />
                                    <Bar dataKey="Saldo" fill="#8b5cf6" radius={[4, 4, 0, 0]} maxBarSize={40} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                        {renderPieChartCard("Para onde vai meu dinheiro? (Categorias)", dashboardChartData, COLORS_GERAL)}
                        {renderPieChartCard("Gastos: Fixos vs Variáveis", fixedVariableChartData, ['#f43f5e', '#f59e0b'])}
                        {renderPieChartCard("Rendimentos", incomeChartData, COLORS_INCOME)}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                        {renderPieChartCard("Gastos com Cartão de Crédito", creditCardChartData, COLORS_CC)}
                        {renderPieChartCard("Valor Investido", investmentChartData, COLORS_INVEST)}
                    </div>
                </div>
            );

            const renderPlanejamento = () => {
                const goals = budgetData[currentMonth]?.goals || { fixed: 50, variable: 30, investment: 20 };
                const totalGoalPercent = Number(goals.fixed) + Number(goals.variable) + Number(goals.investment);
                const isExceeding = totalGoalPercent > 100;
                const plan = { fixed: (goals.fixed / 100) * totals.renda, variable: (goals.variable / 100) * totals.renda, investment: (goals.investment / 100) * totals.renda };
                const chartData = [ { name: 'Contas Fixas', value: goals.fixed, color: '#3b82f6' }, { name: 'Despesas Variáveis', value: goals.variable, color: '#ec4899' }, { name: 'Investimentos', value: goals.investment, color: '#10b981' } ].filter(d => d.value > 0);

                const renderAlertCard = (title, actual, planned) => {
                    const isOk = actual <= planned;
                    const percent = planned > 0 ? (actual / planned) * 100 : 0;
                    return (
                        <div className={`p-4 rounded-xl border ${isOk ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-100'}`}>
                            <div className="flex justify-between items-center mb-3">
                                <span className="font-bold text-[10px] md:text-xs text-slate-600 uppercase tracking-wide">{title}</span>
                                <span className={`text-[10px] md:text-xs font-bold px-2 py-1 rounded flex items-center gap-1 ${isOk ? 'bg-emerald-200 text-emerald-800' : 'bg-rose-200 text-rose-800'}`}>
                                    <Icon name={isOk ? "check-circle-2" : "alert-triangle"} className="w-3 h-3" /> {isOk ? 'OK' : 'ACIMA'}
                                </span>
                            </div>
                            <div className="flex justify-between items-end">
                                <span className={`text-2xl md:text-3xl font-bold ${isOk ? 'text-emerald-700' : 'text-rose-700'}`}>{percent.toFixed(0)}%</span>
                                <div className="text-right flex flex-col">
                                    <span className="text-[10px] md:text-xs text-slate-500 line-through decoration-slate-300">{formatCurrency(planned)}</span>
                                    <span className={`text-xs md:text-sm font-bold ${isOk ? 'text-emerald-700' : 'text-rose-700'}`}>{formatCurrency(actual)}</span>
                                </div>
                            </div>
                            <div className="mt-3 w-full bg-white/50 rounded-full h-1.5 overflow-hidden">
                                <div className={`h-full transition-all ${isOk ? 'bg-emerald-500' : 'bg-rose-500'}`} style={{ width: `${Math.min(100, percent)}%` }} />
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h3 className="font-bold text-slate-800 uppercase text-xs md:text-sm tracking-wide mb-6">Definição de Metas (%)</h3>
                                <div className="space-y-6">
                                    {[ { id: 'fixed', label: 'Contas Fixas', color: 'text-blue-600', bg: 'accent-blue-500' }, { id: 'variable', label: 'Despesas Variáveis', color: 'text-pink-600', bg: 'accent-pink-500' }, { id: 'investment', label: 'Investimentos', color: 'text-emerald-600', bg: 'accent-emerald-500' } ].map(g => (
                                        <div key={g.id}>
                                            <div className="flex justify-between text-xs md:text-sm mb-2 font-semibold text-slate-700">
                                                <span>{g.label}</span>
                                                <div className="flex gap-3"><span className="text-slate-400">{formatCurrency(plan[g.id])}</span><span className={g.color}>{goals[g.id]}%</span></div>
                                            </div>
                                            <input type="range" min="0" max="100" value={goals[g.id]} onChange={(e) => handleGoalChange(g.id, e.target.value)} className={`w-full h-3 md:h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer ${g.bg}`} />
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-8 pt-6 border-t border-slate-100">
                                    <div className="flex justify-between text-[10px] md:text-xs font-bold text-slate-500 mb-2 uppercase">

                            </div>
                            <div className="bg-white p-5 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                                <h3 className="text-[11px] md:text-[13px] font-extrabold text-slate-800 uppercase tracking-widest mb-6">O que é a reserva?</h3>
                                <div className="space-y-6">
                                    <div className="flex gap-3 md:gap-4">
                                        <div className="w-10 h-10 md:w-12 md:h-12 rounded-2xl bg-[#f0f7ff] flex items-center justify-center shrink-0 border border-blue-100/50"><Icon name="shield-check" className="w-5 h-5 text-blue-500" /></div>
                                        <div><h4 className="font-extrabold text-slate-800 text-[11px] md:text-xs uppercase tracking-wide">Para que serve?</h4><p className="text-[10px] md:text-[11px] text-slate-500 mt-1.5 leading-relaxed">Cobre imprevistos como demissão ou saúde sem precisar de empréstimos.</p></div>
                                    </div>
                                    <div className="flex gap-3 md:gap-4">
                                        <div className="w-10 h-10 md:w-12 md:h-12 rounded-2xl bg-amber-50 flex items-center justify-center shrink-0 border border-amber-100/50"><Icon name="help-circle" className="w-5 h-5 text-amber-500" /></div>
                                        <div><h4 className="font-extrabold text-slate-800 text-[11px] md:text-xs uppercase tracking-wide">Quanto guardar?</h4><p className="text-[10px] md:text-[11px] text-slate-500 mt-1.5 leading-relaxed">O ideal é ter entre 6 e 12 meses do seu custo de vida atual.</p></div>
                                    </div>
                                    <div className="flex gap-3 md:gap-4">
                                        <div className="w-10 h-10 md:w-12 md:h-12 rounded-2xl bg-emerald-50 flex items-center justify-center shrink-0 border border-emerald-100/50"><Icon name="trending-up" className="w-5 h-5 text-emerald-500" /></div>
                                        <div><h4 className="font-extrabold text-slate-800 text-[11px] md:text-xs uppercase tracking-wide">Onde investir?</h4><p className="text-[10px] md:text-[11px] text-slate-500 mt-1.5 leading-relaxed">Priorize Liquidez Diária (resgate imediato) e Baixo Risco (Tesouro Selic).</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-7">
                            <div className="bg-white p-4 md:p-8 rounded-3xl shadow-sm border border-slate-200 h-full">
                                <h3 className="text-[11px] md:text-[13px] font-extrabold text-slate-800 uppercase tracking-widest mb-6">Histórico Mensal</h3>
                                <div className="overflow-x-auto scrollbar-hide">
                                    <table className="w-full text-sm text-left min-w-[450px]">
                                        <thead className="text-[9px] md:text-[10px] text-slate-400 uppercase border-b border-slate-100">
                                            <tr>
                                                <th className="pb-3 md:pb-4 font-bold tracking-widest whitespace-nowrap">Mês</th>
                                                <th className="pb-3 md:pb-4 font-bold tracking-widest whitespace-nowrap">Renda</th>
                                                <th className="pb-3 md:pb-4 font-bold tracking-widest whitespace-nowrap">Gastos</th>
                                                <th className="pb-3 md:pb-4 font-bold tracking-widest whitespace-nowrap">Investido</th>
                                                <th className="pb-3 md:pb-4 font-bold tracking-widest text-right whitespace-nowrap">Sobrou</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {historyData.map((data, index) => (
                                                <tr key={data.month} className="border-b border-slate-50 last:border-0 hover:bg-slate-50/50 transition-colors">
                                                    <td className="py-3 md:py-4 font-extrabold text-slate-700 text-[10px] md:text-xs tracking-wide lowercase whitespace-nowrap">{data.month.substring(0, 3)}</td>
                                                    <td className="py-3 md:py-4 text-emerald-600 font-bold text-[10px] md:text-xs whitespace-nowrap">{formatCurrency(data.renda)}</td>
                                                    <td className="py-3 md:py-4 text-rose-600 font-bold text-[10px] md:text-xs whitespace-nowrap">{formatCurrency(data.gastos)}</td>
                                                    <td className="py-3 md:py-4 text-blue-600 font-bold text-[10px] md:text-xs whitespace-nowrap">{formatCurrency(data.investido)}</td>
                                                    <td className={`py-3 md:py-4 text-right font-black text-xs md:text-sm whitespace-nowrap ${data.saldo >= 0 ? 'text-emerald-700' : 'text-rose-600'}`}>{formatCurrency(data.saldo)}</td>
                                                </tr>
                                            ))}
                                            {historyData.length === 0 && <tr><td colSpan="5" className="py-8 text-center text-slate-400 italic text-xs md:text-sm">Nenhum histórico.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const TABS = [
                { id: 'dashboard', label: 'Dashboard' }, { id: 'renda', label: 'Renda' }, { id: 'gastos', label: 'Gastos' },
                { id: 'planejamento', label: 'Planejamento' }, { id: 'investimento', label: 'Investimentos' }, { id: 'historico', label: 'Reserva e Histórico' }
            ];

            if (loading) return <div className="min-h-screen flex flex-col items-center justify-center bg-[#f8fafc]"><Icon name="loader-2" className="w-10 h-10 text-amber-500 animate-spin mb-4" /><p className="text-slate-500 font-medium text-sm">Sincronizando dados...</p></div>;

            return (
                <div className="min-h-screen bg-[#f8fafc] text-slate-800 pb-20 font-sans">
                    {confirmMonthChange !== null && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm px-4">
                            <div className="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full shadow-2xl">
                                <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-2">Fechar o mês?</h3>
                                <p className="text-xs md:text-sm text-slate-500 mb-6">Tem certeza que deseja fechar <strong>{MONTHS[currentMonthIdx]}</strong> e ir para o próximo mês?</p>
                                <div className="flex gap-3 justify-end">
                                    <button onClick={() => setConfirmMonthChange(null)} className="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-slate-600 hover:bg-slate-100">Cancelar</button>
                                    <button onClick={() => { setCurrentMonthIdx(confirmMonthChange); setConfirmMonthChange(null); }} className="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-white bg-amber-500 hover:bg-amber-600">Sim, fechar mês</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 py-3 md:py-4 flex flex-col lg:flex-row justify-between items-center gap-3 md:gap-4">
                            <div className="flex items-center justify-between w-full lg:w-auto">
                                <div className="flex items-center gap-2">
                                    <div className="relative flex items-center">
                                        <Icon name="trending-up" className="w-5 h-5 md:w-6 md:h-6 text-amber-500" />
                                        <div className="absolute -top-1 -left-1 w-2 h-2 bg-yellow-300 rounded-full animate-pulse"></div>
                                    </div>
                                    <h1 className="text-xl md:text-2xl font-black text-[#1e293b] tracking-tighter lowercase">SaaS Financeiro</h1>
                                </div>
                                <div className="flex lg:hidden items-center gap-1.5 text-[10px] font-medium">
                                    {errorMsg ? <span className="flex items-center text-rose-500"><Icon name="alert-circle" className="w-3.5 h-3.5" /></span> : saving ? <span className="flex items-center text-slate-500"><Icon name="loader-2" className="w-3.5 h-3.5 animate-spin" /></span> : <span className="flex items-center text-emerald-600"><Icon name="save" className="w-3.5 h-3.5" /></span>}
                                </div>
                            </div>
                            <div className="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto">
                                <div className="flex items-center justify-between border border-slate-200 bg-slate-50 rounded-lg p-1 w-full sm:w-auto">
                                    <button onClick={() => setCurrentMonthIdx(m => Math.max(0, m - 1))} disabled={currentMonthIdx === 0} className="p-1.5 md:p-2 disabled:opacity-30 hover:bg-white rounded transition-colors"><Icon name="chevron-left" className="w-4 h-4" /></button>
                                    <div className="font-bold text-xs md:text-sm text-slate-700 uppercase tracking-widest px-4 md:px-6">{currentMonth}</div>
                                    <button onClick={() => setConfirmMonthChange(Math.min(11, currentMonthIdx + 1))} disabled={currentMonthIdx === 11} className="p-1.5 md:p-2 disabled:opacity-30 hover:bg-white rounded transition-colors"><Icon name="chevron-right" className="w-4 h-4" /></button>
                                </div>
                                <div className="hidden lg:flex items-center gap-2 text-xs font-medium whitespace-nowrap px-2">
                                    {errorMsg ? <span className="flex items-center gap-1 text-rose-500"><Icon name="alert-circle" className="w-4 h-4" /> {errorMsg}</span> : saving ? <span className="flex items-center gap-1 text-slate-500"><Icon name="loader-2" className="w-4 h-4 animate-spin" /> Salvando...</span> : <span className="flex items-center gap-1 text-emerald-600"><Icon name="save" className="w-4 h-4" /> Sincronizado</span>}
                                </div>
                                <div className="flex items-center gap-2 w-full sm:w-auto">
                                    <button className="flex-1 sm:flex-none flex justify-center items-center gap-1.5 px-3 md:px-4 py-2 bg-[#f0f7ff] text-blue-700 border border-blue-200 rounded-lg text-xs md:text-sm font-bold hover:bg-blue-100">
                                        <Icon name="credit-card" className="w-3.5 h-3.5" /> Assinatura
                                    </button>
                                    <button onClick={logout} className="flex-1 sm:flex-none flex justify-center items-center gap-1.5 px-3 md:px-4 py-2 bg-rose-50 text-rose-600 border border-rose-200 rounded-lg text-xs md:text-sm font-bold hover:bg-rose-100">
                                        <Icon name="log-out" className="w-3.5 h-3.5" /> Sair
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="border-t border-slate-100 w-full overflow-x-auto scrollbar-hide">
                            <div className="max-w-7xl mx-auto px-2 sm:px-4 flex flex-nowrap justify-start lg:justify-center gap-1 sm:gap-4 md:gap-8">
                                {TABS.map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`py-3 md:py-4 px-3 md:px-4 border-b-2 transition-colors whitespace-nowrap text-xs md:text-sm font-bold ${activeTab === tab.id ? 'border-amber-500 text-amber-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}>
                                        {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>
                    <main className="max-w-7xl mx-auto px-4 mt-6 md:mt-8">
                        {activeTab === 'dashboard' && renderDashboard()}
                        {activeTab === 'renda' && renderRenda()}
                        {activeTab === 'gastos' && renderGastos()}
                        {activeTab === 'investimento' && renderInvestimento()}
                        {activeTab === 'planejamento' && renderPlanejamento()}
                        {activeTab === 'historico' && renderHistorico()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
