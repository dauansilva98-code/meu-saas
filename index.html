<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumis - Organizador Financeiro</title>
    
    <script>
      if (localStorage.getItem("logado") !== "sim") {
        window.location.href = "login.html";
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        input[type=range] { accent-color: #3b82f6; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 pb-20 font-sans">

    <div id="app-root">
        <div class="min-h-screen flex flex-col items-center justify-center bg-[#f8fafc]">
            <i data-lucide="loader-2" class="w-10 h-10 text-blue-600 animate-spin mb-4"></i>
            <p class="text-slate-500 font-medium text-sm">Validando acesso e carregando...</p>
        </div>
    </div>

    <div id="modal-root"></div>

    <script>
        // --- CONFIGURAÇÃO DO SUPABASE ---
        const SUPABASE_URL = 'https://izmdjkalwgupuehrbcxm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bWRqa2Fsd2d1cHVlaHJiY3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNDkwNTUsImV4cCI6MjA4NTgyNTA1NX0.w3FW5oORqiEjT0Xj3d3777KfE0xl2zm0ogezpfN3Gss'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- CONSTANTES E CONFIGURAÇÕES PADRÃO ---
        const MONTHS = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const CATEGORIES_CONFIG = {
            'Renda Familiar': { icon: 'Wallet', type: 'income', items: ['Salário Principal', 'Salário Secundário', 'Renda Extra', 'Outros'] },
            'Casa': { icon: 'Home', type: 'expense', items: ['Aluguel / Prestação', 'Condomínio', 'Luz', 'Água', 'Internet', 'Mercado', 'Gás'] },
            'Automóvel': { icon: 'Car', type: 'expense', items: ['Parcela do Carro', 'Combustível', 'Seguro', 'IPVA', 'Mecânico', 'Lavagem'] },
            'Saúde': { icon: 'HeartPulse', type: 'expense', items: ['Plano de Saúde', 'Farmácia', 'Consultas', 'Outros'] },
            'Transporte': { icon: 'Bus', type: 'expense', items: ['Transporte Público', 'Aplicativos (Uber/99)'] },
            'Lazer': { icon: 'Smile', type: 'expense', items: ['Alimentação fora', 'Assinaturas (Netflix, etc)', 'Passeios', 'Compras'] },
            'Cartão de Crédito': { icon: 'CreditCard', type: 'expense', items: ['Cartão Principal', 'Cartão Adicional'] },
            'Investimento': { icon: 'TrendingUp', type: 'investment', items: ['Reserva de Emergência', 'Renda Fixa', 'Renda Variável'] },
        };

        const DEFAULT_METADATA = { 'Renda Familiar': 'income', 'Casa': 'expense', 'Saúde': 'expense', 'Automóvel': 'expense', 'Transporte': 'expense', 'Cartão de Crédito': 'expense', 'Investimento': 'investment' };
        const COLORS_GERAL = ['#0ea5e9', '#ec4899', '#10b981', '#8b5cf6', '#f59e0b', '#6366f1', '#f43f5e', '#14b8a6'];
        const COLORS_INCOME = ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f43f5e', '#6366f1'];
        const COLORS_CC = ['#8b5cf6', '#f59e0b', '#ec4899', '#10b981', '#3b82f6', '#f43f5e', '#14b8a6'];
        const COLORS_INVEST = ['#1e293b', '#f59e0b', '#3b82f6', '#10b981']; 
        const GOAL_COLORS = { blue: { text: 'text-blue-600', hex: '#3b82f6' }, pink: { text: 'text-pink-600', hex: '#ec4899' }, emerald: { text: 'text-emerald-600', hex: '#10b981' }, purple: { text: 'text-purple-600', hex: '#a855f7' }, amber: { text: 'text-amber-500', hex: '#f59e0b' }, orange: { text: 'text-orange-500', hex: '#f97316' }, teal: { text: 'text-teal-500', hex: '#14b8a6' } };
        const DYNAMIC_COLORS = ['purple', 'amber', 'orange', 'teal'];
        const DEFAULT_FIXED_ITEMS = ['Condomínio', 'Luz', 'Água', 'Internet', 'Aluguel', 'Prestação', 'Plano de Saúde', 'Parcela do Carro', 'IPVA', 'Seguro', 'Assinaturas'];
        const isDefaultFixed = (itemName) => DEFAULT_FIXED_ITEMS.some(keyword => itemName.toLowerCase().includes(keyword.toLowerCase()));

        // --- ESTADO ---
        const currentYearString = new Date().getFullYear().toString();
        const AppState = { user: null, budgetData: { [currentYearString]: generateEmptyYearData() }, currentYear: currentYearString, currentMonthIdx: new Date().getMonth(), activeTab: 'dashboard', loading: true, saving: false, errorMsg: null, confirmMonthChange: null, charts: {}, get currentMonth() { return MONTHS[this.currentMonthIdx]; }, get currentData() { return this.budgetData[this.currentYear][this.currentMonth]; } };

        function generateEmptyYearData() {
            let data = {};
            MONTHS.forEach(m => {
                data[m] = { goals: { fixed: { label: 'Contas Fixas', value: 50, color: 'blue' }, variable: { label: 'Despesas Variáveis', value: 30, color: 'pink' }, investment: { label: 'Investimentos', value: 20, color: 'emerald' } }, itemMetadata: {}, categoriesMetadata: { ...DEFAULT_METADATA } };
                Object.keys(CATEGORIES_CONFIG).forEach(cat => {
                    data[m][cat] = {}; data[m].itemMetadata[cat] = {};
                    CATEGORIES_CONFIG[cat].items.forEach(item => {
                        data[m][cat][item] = 0;
                        if (CATEGORIES_CONFIG[cat].type === 'investment') data[m].itemMetadata[cat][item] = item.toLowerCase().includes('reserva') ? 'reserva' : item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel';
                        else data[m].itemMetadata[cat][item] = isDefaultFixed(item) ? 'fixed' : 'variable';
                    });
                });
            });
            return data;
        }

        function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
        function safeId(str) { return str.toString().replace(/[^a-z0-9]/gi, '-').toLowerCase(); }
        function formatCurrency(value) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0); }
        function parseCurrencyString(val) { const raw = String(val).replace(/\D/g, ''); return raw ? Number(raw) / 100 : 0; }
        function formatCurrencyInput(val) { const num = Number(val); if (isNaN(num)) return '0,00'; return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num); }
        function getCategoryIconAndColor(catName) { if (CATEGORIES_CONFIG[catName]) return { ...CATEGORIES_CONFIG[catName], color: 'text-slate-600', bg: 'bg-slate-100' }; return { icon: 'Receipt', color: 'text-slate-600', bg: 'bg-slate-100', type: 'expense' }; }
        function getCategoryTotal(year, month, category) { if (!AppState.budgetData[year] || !AppState.budgetData[year][month] || !AppState.budgetData[year][month][category]) return 0; return Object.values(AppState.budgetData[year][month][category]).reduce((acc, val) => acc + (Number(val) || 0), 0); }

        function calculateMetrics() {
            const calcMonth = (y, m) => {
                let renda = 0, gastos = 0, fixos = 0, variaveis = 0, investimentos = 0, reservaAtual = 0;
                if(!AppState.budgetData[y] || !AppState.budgetData[y][m]) return { renda, gastos, saldo: 0, fixos, variaveis, investimentos, reservaAtual };
                Object.keys(AppState.budgetData[y][m]).forEach(cat => {
                    if (['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) return;
                    const config = CATEGORIES_CONFIG[cat] || { type: 'expense' };
                    const catMetaType = AppState.budgetData[y][m].categoriesMetadata?.[cat] || config.type || 'expense';
                    if (catMetaType === 'income') renda += getCategoryTotal(y, m, cat);
                    else if (catMetaType === 'investment') {
                        Object.entries(AppState.budgetData[y][m][cat]).forEach(([item, val]) => {
                            const numVal = Number(val) || 0;
                            const type = AppState.budgetData[y][m].itemMetadata?.[cat]?.[item] || 'variavel';
                            if(type === 'reserva') reservaAtual += numVal; else investimentos += numVal;
                        });
                    } else {
                        Object.entries(AppState.budgetData[y][m][cat]).forEach(([item, val]) => {
                            const numVal = Number(val) || 0; gastos += numVal;
                            const type = AppState.budgetData[y][m].itemMetadata?.[cat]?.[item] || 'variable';
                            if (type === 'fixed') fixos += numVal; else variaveis += numVal;
                        });
                    }
                });
                return { renda, gastos, saldo: renda - (gastos + investimentos + reservaAtual), fixos, variaveis, investimentos, reservaAtual };
            };
            const current = calcMonth(AppState.currentYear, AppState.currentMonth);
            let acumulado = 0, reservaTotalAcumulada = 0; const historyList = [];
            for (let i = 0; i < 12; i++) {
                const mData = calcMonth(AppState.currentYear, MONTHS[i]); acumulado += mData.saldo; reservaTotalAcumulada += mData.reservaAtual;
                historyList.push({ month: MONTHS[i], renda: mData.renda, gastos: mData.gastos, investido: mData.investimentos + mData.reservaAtual, saldo: mData.saldo });
            }
            return { totals: { ...current, acumulado }, metrics: { custoDeVida: current.fixos, metaReserva6m: current.fixos * 6, metaReserva12m: current.fixos * 12, reservaTotalAcumulada }, historyData: historyList };
        }

        // --- BANCO DE DADOS ---
        function updateSyncUI() {
            const headerDesk = document.getElementById('sync-status-desktop'); const headerMob = document.getElementById('sync-status-mobile');
            let statusHTML = AppState.errorMsg ? `<span class="flex items-center gap-1 text-rose-500"><i data-lucide="alert-circle" class="w-4 h-4"></i> <span class="hidden lg:inline">${AppState.errorMsg}</span></span>` : AppState.saving ? `<span class="flex items-center gap-1 text-slate-500"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span class="hidden lg:inline">Salvando...</span></span>` : `<span class="flex items-center gap-1 text-emerald-600"><i data-lucide="save" class="w-4 h-4"></i> <span class="hidden lg:inline">Sincronizado</span></span>`;
            if (headerDesk) headerDesk.innerHTML = statusHTML; if (headerMob) headerMob.innerHTML = statusHTML; lucide.createIcons();
        }

        async function saveToDatabase() {
            AppState.saving = true; AppState.errorMsg = null; updateSyncUI();
            try {
                if (!AppState.user) return;
                const { error } = await supabaseClient.from('dados_financeiros').upsert({ id: AppState.user.id, payload: AppState.budgetData, updated_at: new Date() });
                if (error) throw error;
            } catch (error) { AppState.errorMsg = "Falha ao salvar."; } finally { AppState.saving = false; updateSyncUI(); }
        }

        async function loadDatabaseData() {
            try {
                if (!AppState.user) return;
                const { data, error } = await supabaseClient.from('dados_financeiros').select('payload').eq('id', AppState.user.id).single();
                if (data && data.payload) {
                    if (data.payload.incomes) AppState.budgetData = { [currentYearString]: generateEmptyYearData() };
                    else AppState.budgetData = data.payload;
                }
            } catch (error) { console.error(error); } finally { AppState.loading = false; renderApp(); }
        }

        window.AppActions = {
            sair: async () => { await supabaseClient.auth.signOut(); localStorage.removeItem("logado"); window.location.href = "login.html"; },
            changeTab: (tabId) => { AppState.activeTab = tabId; renderApp(); },
            changeYear: (delta) => { const newYearStr = (parseInt(AppState.currentYear) + delta).toString(); if (!AppState.budgetData[newYearStr]) AppState.budgetData[newYearStr] = generateEmptyYearData(); AppState.currentYear = newYearStr; renderApp(); },
            prevMonth: () => { if (AppState.currentMonthIdx > 0) { AppState.currentMonthIdx--; renderApp(); } },
            nextMonthConfirm: () => { if (AppState.currentMonthIdx < 11) { AppState.confirmMonthChange = AppState.currentMonthIdx + 1; renderModal(); } },
            closeModal: () => { AppState.confirmMonthChange = null; renderModal(); },
            confirmMonthChange: () => { AppState.currentMonthIdx = AppState.confirmMonthChange; AppState.confirmMonthChange = null; renderApp(); },
            handleInputDebounced: (year, month, category, item, inputEl) => {
                const rawDigits = inputEl.value.replace(/\D/g, ''); inputEl.value = rawDigits ? formatCurrencyInput(Number(rawDigits) / 100) : '0,00';
                clearTimeout(typingTimer); typingTimer = setTimeout(() => {
                    const numValue = parseCurrencyString(inputEl.value);
                    if (AppState.budgetData[year][month][category][item] !== numValue) { AppState.budgetData[year][month][category][item] = numValue; saveToDatabase(); renderApp(); }
                }, 1000);
            },
            handleBlur: (year, month, category, item, inputEl) => { clearTimeout(typingTimer); const numValue = parseCurrencyString(inputEl.value); inputEl.value = formatCurrencyInput(numValue); if (AppState.budgetData[year][month][category][item] !== numValue) { AppState.budgetData[year][month][category][item] = numValue; saveToDatabase(); renderApp(); } },
            handleGoalInput: (id, val, renda) => {
                const numVal = parseInt(val) || 0; const percentEl = document.getElementById(`goal-val-${id}`); if(percentEl) percentEl.innerText = numVal + '%';
                const plannedVal = (numVal / 100) * renda; const planValEl = document.getElementById(`plan-val-${id}`); if(planValEl) planValEl.innerText = formatCurrency(plannedVal);
                let total = 0; document.querySelectorAll('.goal-slider').forEach(s => total += parseInt(s.value) || 0);
                const isExc = total > 100; const totalText = document.getElementById('plan-total-text'); if(totalText) { totalText.innerText = total + '%'; totalText.className = isExc ? 'text-rose-500 font-bold' : 'text-blue-600 font-bold'; }
                const totalBar = document.getElementById('plan-total-bar'); if(totalBar) { totalBar.style.width = Math.min(100, total) + '%'; totalBar.className = `h-full transition-all ${isExc ? 'bg-rose-500' : 'bg-blue-500'}`; }
                const excMsg = document.getElementById('plan-exc-msg'); if(excMsg) excMsg.style.display = isExc ? 'block' : 'none';
            },
            handleGoalChange: (year, month, id, val) => { AppState.budgetData[year][month].goals[id].value = parseInt(val) || 0; saveToDatabase(); renderApp(); },
            addGoal: (year, month) => { const newId = 'custom_' + Date.now(); AppState.budgetData[year][month].goals[newId] = { label: 'Novo Objetivo', value: 0, color: DYNAMIC_COLORS[Object.keys(AppState.budgetData[year][month].goals).length % DYNAMIC_COLORS.length] }; saveToDatabase(); renderApp(); },
            removeGoal: (year, month, id) => { delete AppState.budgetData[year][month].goals[id]; saveToDatabase(); renderApp(); },
            renameGoal: (year, month, id, inputEl) => { AppState.budgetData[year][month].goals[id].label = inputEl.value.trim() || 'Objetivo'; saveToDatabase(); renderApp(); },
            handleTypeChange: (year, month, category, item, newType) => { if (!AppState.budgetData[year][month].itemMetadata[category]) AppState.budgetData[year][month].itemMetadata[category] = {}; AppState.budgetData[year][month].itemMetadata[category][item] = newType; saveToDatabase(); renderApp(); },
            handleInstChange: (year, month, category, item, instName) => { if (!AppState.budgetData[year][month].itemMetadata[category]) AppState.budgetData[year][month].itemMetadata[category] = {}; AppState.budgetData[year][month].itemMetadata[category][`${item}_inst`] = instName.trim(); saveToDatabase(); },
            copyFromPreviousMonth: () => {
                let pm = AppState.currentMonthIdx - 1; let py = AppState.currentYear; if (pm < 0) { pm = 11; py = (parseInt(py) - 1).toString(); }
                if (!AppState.budgetData[py] || !AppState.budgetData[py][MONTHS[pm]]) return;
                AppState.budgetData[AppState.currentYear][AppState.currentMonth] = deepClone(AppState.budgetData[py][MONTHS[pm]]); saveToDatabase(); renderApp();
            },
            addCategory: (year, month) => { let name = 'Nova Categoria', c = 1; while (AppState.budgetData[year][month][name] !== undefined) { name = `Nova Categoria ${c}`; c++; } AppState.budgetData[year][month][name] = {}; AppState.budgetData[year][month].categoriesMetadata[name] = 'expense'; saveToDatabase(); renderApp(); },
            renameCategory: (year, month, old, el) => { const nw = el.value.trim(); if (old === nw || nw === '' || AppState.budgetData[year][month][nw] !== undefined) { el.value = old; return; } AppState.budgetData[year][month][nw] = AppState.budgetData[year][month][old]; delete AppState.budgetData[year][month][old]; if (AppState.budgetData[year][month].itemMetadata[old]) { AppState.budgetData[year][month].itemMetadata[nw] = AppState.budgetData[year][month].itemMetadata[old]; delete AppState.budgetData[year][month].itemMetadata[old]; } if (AppState.budgetData[year][month].categoriesMetadata[old]) { AppState.budgetData[year][month].categoriesMetadata[nw] = AppState.budgetData[year][month].categoriesMetadata[old]; delete AppState.budgetData[year][month].categoriesMetadata[old]; } saveToDatabase(); renderApp(); },
            deleteCategory: (year, month, name) => { delete AppState.budgetData[year][month][name]; delete AppState.budgetData[year][month].itemMetadata[name]; delete AppState.budgetData[year][month].categoriesMetadata[name]; saveToDatabase(); renderApp(); },
            addItem: (year, month, cat, def = 'Nova Conta', type = 'auto') => {
                if (!AppState.budgetData[year][month][cat]) { AppState.budgetData[year][month][cat] = {}; AppState.budgetData[year][month].categoriesMetadata[cat] = cat === 'Investimento' ? 'investment' : cat === 'Renda Familiar' ? 'income' : 'expense'; }
                let name = def, c = 1; while (AppState.budgetData[year][month][cat][name] !== undefined) { name = `${def} ${c}`; c++; }
                AppState.budgetData[year][month][cat][name] = 0; if (!AppState.budgetData[year][month].itemMetadata[cat]) AppState.budgetData[year][month].itemMetadata[cat] = {};
                AppState.budgetData[year][month].itemMetadata[cat][name] = type === 'auto' ? (AppState.budgetData[year][month].categoriesMetadata[cat] === 'investment' ? 'variavel' : (isDefaultFixed(name) ? 'fixed' : 'variable')) : type;
                saveToDatabase(); renderApp();
            },
            renameItem: (year, month, cat, old, el) => {
                const nw = el.value.trim(); if (old === nw || nw === '') { el.value = old; return; }
                let fn = nw, c = 1; while (AppState.budgetData[year][month][cat][fn] !== undefined && fn !== old) { fn = `${nw} ${c}`; c++; }
                AppState.budgetData[year][month][cat][fn] = AppState.budgetData[year][month][cat][old]; delete AppState.budgetData[year][month][cat][old];
                if (AppState.budgetData[year][month].itemMetadata[cat]) { AppState.budgetData[year][month].itemMetadata[fn] = AppState.budgetData[year][month].itemMetadata[old]; delete AppState.budgetData[year][month].itemMetadata[old]; }
                saveToDatabase(); renderApp();
            },
            deleteItem: (year, month, cat, name) => { delete AppState.budgetData[year][month][cat][name]; if (AppState.budgetData[year][month].itemMetadata[cat]) { delete AppState.budgetData[year][month].itemMetadata[cat][name]; } saveToDatabase(); renderApp(); }
        };

        // --- RENDERIZADORES ---
        function destroyCharts() { Object.values(AppState.charts).forEach(chart => chart.destroy()); AppState.charts = {}; }
        function createPieChart(canvasId, data, colors, chartType = 'pie') {
            const ctx = document.getElementById(canvasId); if (!ctx) return;
            AppState.charts[canvasId] = new Chart(ctx, { type: chartType, plugins: [window.ChartDataLabels], data: { labels: data.map(d => d.name), datasets: [{ data: data.map(d => d.value), backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: chartType === 'doughnut' ? '65%' : undefined, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => { const val = ctx.raw; const total = ctx.dataset.data.reduce((a, b) => a + b, 0); const pct = total > 0 ? ((val / total) * 100).toFixed(1) : 0; return ` R$ ${formatCurrency(val).replace('R$', '').trim()} (${pct}%)`; } } }, datalabels: { color: '#ffffff', font: { weight: 'bold', size: 10 }, textShadowBlur: 4, textShadowColor: 'rgba(0,0,0,0.6)', formatter: (value, context) => { const total = context.chart.data.datasets[0].data.reduce((a, b) => a + b, 0); const pct = total > 0 ? ((value / total) * 100) : 0; if (pct < 5) return null; return pct.toFixed(0) + '%'; } } } } });
        }
        function createBarChart(canvasId, data) {
            const ctx = document.getElementById(canvasId); if (!ctx) return;
            AppState.charts[canvasId] = new Chart(ctx, { type: 'bar', data: { labels: data.map(d => d.name), datasets: [{ label: 'Rendimentos', data: data.map(d => d.Rendimentos), backgroundColor: '#10b981', borderRadius: 4 }, { label: 'Gastos', data: data.map(d => d.Gastos), backgroundColor: '#f43f5e', borderRadius: 4 }, { label: 'Investido', data: data.map(d => d.Investido), backgroundColor: '#3b82f6', borderRadius: 4 }, { label: 'Saldo', data: data.map(d => d.Saldo), backgroundColor: '#8b5cf6', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, y: { grid: { color: '#e2e8f0' }, ticks: { font: { size: 10 } } } }, plugins: { datalabels: { display: false }, legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 6, font: {size: 10} } } } } });
        }
        function renderPieChartCard(id, title, data, colors) {
            const isEmpty = data.length === 0;
            return `<div class="bg-white p-6 rounded-3xl shadow-sm border flex flex-col h-full"><h3 class="font-extrabold text-blue-700 uppercase text-xs tracking-widest text-center mb-4">${title}</h3>${!isEmpty ? `<div class="w-full flex justify-center pb-6 border-b"><div class="relative h-48 w-48"><canvas id="${id}"></canvas></div></div><div class="mt-4 space-y-2">${data.map((entry, i) => `<div class="flex justify-between text-xs items-center"><span>${entry.name}</span><strong>${formatCurrency(entry.value)}</strong></div>`).join('')}</div>` : `<div class="flex-1 flex items-center justify-center text-slate-400 italic text-sm min-h-[160px]">Nenhum dado</div>`}</div>`;
        }

        function renderDashboard() {
            const { totals, historyData } = calculateMetrics();
            const yearlyBarData = MONTHS.map(m => { let r = 0, g = 0, i = 0; if(AppState.budgetData[AppState.currentYear] && AppState.budgetData[AppState.currentYear][m]) { Object.keys(AppState.budgetData[AppState.currentYear][m]).forEach(cat => { if (['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) return; const type = AppState.budgetData[AppState.currentYear][m].categoriesMetadata?.[cat]; if (type === 'income') r += getCategoryTotal(AppState.currentYear, m, cat); else if (type === 'investment') i += getCategoryTotal(AppState.currentYear, m, cat); else g += getCategoryTotal(AppState.currentYear, m, cat); }); } return { name: m.substring(0, 3), Rendimentos: r, Gastos: g, Investido: i, Saldo: r - (g + i) }; });
            setTimeout(() => { createBarChart('dashboard-bar-chart', yearlyBarData); }, 0);
            return `<div class="space-y-6"><div class="grid grid-cols-2 md:grid-cols-5 gap-4">${[ { l: 'Rendimentos', v: totals.renda, c: 'text-emerald-600' }, { l: 'Gastos', v: totals.gastos, c: 'text-rose-600' }, { l: 'Investido', v: totals.investimentos + totals.reservaAtual, c: 'text-blue-600' }, { l: 'Saldo Mês', v: totals.saldo, c: totals.saldo >= 0 ? 'text-emerald-700' : 'text-rose-700' }, { l: 'Acumulado', v: totals.acumulado, c: totals.acumulado >= 0 ? 'text-blue-700' : 'text-rose-700' } ].map(card => `<div class="bg-white p-4 rounded-2xl border shadow-sm"><p class="text-[10px] font-bold text-slate-500 uppercase">${card.l}</p><p class="text-lg font-bold truncate ${card.c}">${formatCurrency(card.v)}</p></div>`).join('')}</div><div class="bg-white p-6 rounded-2xl border shadow-sm"><h3 class="font-bold text-center mb-6">Evolução ${AppState.currentYear}</h3><div class="h-64"><canvas id="dashboard-bar-chart"></canvas></div></div></div>`;
        }

        function renderEditableRowHTML(name, value, type, isInc, isInv, cat) {
            const clr = isInc ? 'text-emerald-600 focus:bg-emerald-50' : 'text-rose-600 focus:bg-rose-50';
            const y = AppState.currentYear; const m = AppState.currentMonth;
            let sel = isInv ? `<select onchange="AppActions.handleTypeChange('${y}','${m}','${cat}','${name}',this.value)" class="text-[9px] uppercase font-bold rounded px-1.5 py-1 ${type==='reserva'?'bg-blue-100 text-blue-700':type==='fixa'?'bg-emerald-100 text-emerald-700':'bg-purple-100 text-purple-700'}"><option value="reserva" ${type==='reserva'?'selected':''}>Reserva</option><option value="fixa" ${type==='fixa'?'selected':''}>Fixa</option><option value="variavel" ${type==='variavel'?'selected':''}>Var</option></select>` : !isInc ? `<select onchange="AppActions.handleTypeChange('${y}','${m}','${cat}','${name}',this.value)" class="text-[9px] uppercase font-bold rounded px-1.5 py-1 ${type==='fixed'?'bg-rose-100 text-rose-700':'bg-orange-100 text-orange-700'}"><option value="fixed" ${type==='fixed'?'selected':''}>Fixo</option><option value="variable" ${type==='variable'?'selected':''}>Var</option></select>` : '';
            return `<div class="flex items-center justify-between p-2 bg-white hover:bg-slate-50 border border-slate-100 rounded-xl transition-colors group shadow-sm gap-1"><input type="text" value="${name}" onblur="AppActions.renameItem('${y}','${m}','${cat}','${name}',this)" class="bg-transparent font-semibold text-slate-700 text-xs outline-none flex-1 min-w-[80px]"><div class="flex items-center gap-1 shrink-0">${sel}<input type="text" inputmode="numeric" value="${formatCurrencyInput(value)}" oninput="AppActions.handleInputDebounced('${y}','${m}','${cat}','${name}',this)" onblur="AppActions.handleBlur('${y}','${m}','${cat}','${name}',this)" class="w-20 border-transparent bg-transparent font-bold text-xs text-right outline-none rounded ${clr}"><button onclick="AppActions.deleteItem('${y}','${m}','${cat}','${name}')" class="text-rose-400 hover:text-rose-600 group-hover:opacity-100 opacity-0 transition-opacity"><i data-lucide="x" class="w-4 h-4"></i></button></div></div>`;
        }

        function renderRenda() {
            const entries = Object.entries(AppState.currentData['Renda Familiar'] || {});
            return `<div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl border shadow-sm"><div class="flex justify-between mb-6"><h3>Minhas Rendas</h3><button onclick="AppActions.addItem('${AppState.currentYear}','${AppState.currentMonth}','Renda Familiar','Nova Renda','income')" class="bg-blue-500 text-white px-4 py-2 rounded-xl text-xs font-bold">Adicionar</button></div><div class="space-y-3">${entries.map(([n,v]) => renderEditableRowHTML(n,v,'income',true,false,'Renda Familiar')).join('')}</div></div>`;
        }

        function renderGastos() {
            const expenseCats = Object.keys(AppState.currentData).filter(cat => !['goals','itemMetadata','categoriesMetadata'].includes(cat) && AppState.currentData.categoriesMetadata?.[cat] === 'expense');
            let html = `<div class="grid grid-cols-1 md:grid-cols-4 gap-4">`;
            expenseCats.forEach(cat => {
                html += `<div class="bg-white p-4 rounded-3xl border shadow-sm"><strong>${cat}</strong><div class="mt-4 space-y-2">${Object.entries(AppState.currentData[cat]).map(([n,v])=>renderEditableRowHTML(n,v,AppState.currentData.itemMetadata?.[cat]?.[n],false,false,cat)).join('')}</div><button onclick="AppActions.addItem('${AppState.currentYear}','${AppState.currentMonth}','${cat}')" class="mt-4 w-full text-blue-600 font-bold text-xs">+ Conta</button></div>`;
            });
            return html + `</div>`;
        }

        function renderPlanejamento() { return renderDashboard(); }
        function renderInvestimento() { return renderDashboard(); }
        function renderHistorico() { return renderDashboard(); }

        function renderHeader() {
            const tabs = [ { id: 'dashboard', label: 'Dashboard' }, { id: 'renda', label: 'Renda' }, { id: 'gastos', label: 'Gastos' } ];
            return `<header class="bg-white border-b sticky top-0 z-20 shadow-sm">
                <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col lg:flex-row justify-between items-center gap-4">
                    <div class="flex items-center justify-between w-full lg:w-auto">
                        <div class="flex items-center gap-2">
                            <img src="logo.png" alt="Lumis Logo" class="h-[400px] w-auto object-contain">
                        </div>
                        <div id="sync-status-mobile" class="lg:hidden"></div>
                    </div>
                    <div class="flex flex-col sm:flex-row items-center gap-3">
                        <div class="flex items-center border bg-slate-50 rounded-lg p-1">
                            <button onclick="AppActions.changeYear(-1)" class="p-2"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            <span class="px-2 font-bold">${AppState.currentYear}</span>
                            <button onclick="AppActions.changeYear(1)" class="p-2"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                            <div class="mx-2 border-l h-4"></div>
                            <button onclick="AppActions.prevMonth()" class="p-2"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            <span class="px-2 font-bold uppercase text-[10px] tracking-widest">${AppState.currentMonth}</span>
                            <button onclick="AppActions.nextMonthConfirm()" class="p-2"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                        </div>
                        <div id="sync-status-desktop" class="hidden lg:block"></div>
                        <button onclick="AppActions.sair()" class="px-4 py-2 bg-rose-50 text-rose-600 rounded-lg text-xs font-bold border border-rose-200">Sair</button>
                    </div>
                </div>
                <div class="max-w-7xl mx-auto px-4 flex overflow-x-auto scrollbar-hide border-t lg:justify-center">
                    ${tabs.map(t => `<button onclick="AppActions.changeTab('${t.id}')" class="py-4 px-4 text-xs font-bold whitespace-nowrap border-b-2 transition-all ${AppState.activeTab === t.id ? 'border-blue-500 text-blue-600' : 'border-transparent text-slate-400'}">${t.label}</button>`).join('')}
                </div>
            </header>`;
        }

        function renderModal() {
            const root = document.getElementById('modal-root');
            if (AppState.confirmMonthChange !== null) root.innerHTML = `<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4"><div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl"><h3>Mudar mês?</h3><div class="flex justify-end gap-3 mt-6"><button onclick="AppActions.closeModal()">Não</button><button onclick="AppActions.confirmMonthChange()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Sim</button></div></div></div>`;
            else root.innerHTML = '';
        }

        function renderApp() {
            if (AppState.loading) return;
            const root = document.getElementById('app-root'); destroyCharts();
            let content = '';
            if(AppState.activeTab === 'dashboard') content = renderDashboard();
            else if(AppState.activeTab === 'renda') content = renderRenda();
            else if(AppState.activeTab === 'gastos') content = renderGastos();
            root.innerHTML = `${renderHeader()}<main class="max-w-7xl mx-auto px-4 mt-8">${content}</main>`;
            lucide.createIcons(); renderModal();
        }

        async function initAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) { AppActions.sair(); return; }
                AppState.user = user; await loadDatabaseData();
            } catch (error) { AppState.loading = false; renderApp(); }
        }
        initAuth();
    </script>
</body>
</html>
