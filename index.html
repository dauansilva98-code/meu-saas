<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumis - Organizador Financeiro</title>
    
    <script>
      if (localStorage.getItem("logado") !== "sim") {
        window.location.href = "login.html";
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* Utilitário para esconder scrollbar mantendo o scroll */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Evita selects com estilo padrão feio no iOS/Safari */
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        
        /* Accent color fallback para sliders cross-browser */
        input[type=range] { accent-color: #3b82f6; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 pb-20 font-sans">

    <div id="app-root">
        <div class="min-h-screen flex flex-col items-center justify-center bg-[#f8fafc]">
            <i data-lucide="loader-2" class="w-10 h-10 text-blue-600 animate-spin mb-4"></i>
            <p class="text-slate-500 font-medium text-sm">Validando acesso e carregando...</p>
        </div>
    </div>

    <div id="modal-root"></div>

    <script>
        // --- CONFIGURAÇÃO DO SUPABASE ---
        const SUPABASE_URL = 'https://izmdjkalwgupuehrbcxm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bWRqa2Fsd2d1cHVlaHJiY3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNDkwNTUsImV4cCI6MjA4NTgyNTA1NX0.w3FW5oORqiEjT0Xj3d3777KfE0xl2zm0ogezpfN3Gss'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- CONSTANTES E CONFIGURAÇÕES PADRÃO ---
        const MONTHS = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const ICON_MAP = { Wallet: 'wallet', Home: 'home', HeartPulse: 'heart-pulse', Bus: 'bus', Car: 'car', Church: 'church', Smile: 'smile', TrendingUp: 'trending-up', CreditCard: 'credit-card', Receipt: 'receipt' };

        const DEFAULT_METADATA = {
            'Renda Familiar': 'income', 'Casa': 'expense', 'Saúde': 'expense', 'Automóvel': 'expense',
            'Transporte': 'expense', 'Cartão de Crédito': 'expense', 'Investimento': 'investment'
        };

        const CATEGORIES_CONFIG = {
            'Renda Familiar': { icon: 'Wallet', type: 'income', items: ['Salário Principal', 'Salário Secundário', 'Renda Extra', 'Outros'] },
            'Casa': { icon: 'Home', type: 'expense', items: ['Aluguel / Prestação', 'Condomínio', 'Luz', 'Água', 'Internet', 'Mercado', 'Gás'] },
            'Automóvel': { icon: 'Car', type: 'expense', items: ['Parcela do Carro', 'Combustível', 'Seguro', 'IPVA', 'Mecânico', 'Lavagem'] },
            'Saúde': { icon: 'HeartPulse', type: 'expense', items: ['Plano de Saúde', 'Farmácia', 'Consultas', 'Outros'] },
            'Transporte': { icon: 'Bus', type: 'expense', items: ['Transporte Público', 'Aplicativos (Uber/99)'] },
            'Lazer': { icon: 'Smile', type: 'expense', items: ['Alimentação fora', 'Assinaturas (Netflix, etc)', 'Passeios', 'Compras'] },
            'Cartão de Crédito': { icon: 'CreditCard', type: 'expense', items: ['Cartão Principal', 'Cartão Adicional'] },
            'Investimento': { icon: 'TrendingUp', type: 'investment', items: ['Reserva de Emergência', 'Renda Fixa', 'Renda Variável'] },
        };

        const COLORS_GERAL = ['#0ea5e9', '#ec4899', '#10b981', '#8b5cf6', '#f59e0b', '#6366f1', '#f43f5e', '#14b8a6'];
        const COLORS_INCOME = ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f43f5e', '#6366f1'];
        const COLORS_CC = ['#8b5cf6', '#f59e0b', '#ec4899', '#10b981', '#3b82f6', '#f43f5e', '#14b8a6'];
        const COLORS_INVEST = ['#1e293b', '#f59e0b', '#3b82f6', '#10b981']; 
        
        const GOAL_COLORS = {
            blue: { text: 'text-blue-600', hex: '#3b82f6' }, pink: { text: 'text-pink-600', hex: '#ec4899' },
            emerald: { text: 'text-emerald-600', hex: '#10b981' }, purple: { text: 'text-purple-600', hex: '#a855f7' },
            amber: { text: 'text-amber-500', hex: '#f59e0b' }, orange: { text: 'text-orange-500', hex: '#f97316' },
            teal: { text: 'text-teal-500', hex: '#14b8a6' }
        };
        const DYNAMIC_COLORS = ['purple', 'amber', 'orange', 'teal'];
        const DEFAULT_FIXED_ITEMS = ['Condomínio', 'Luz', 'Água', 'Internet', 'Aluguel', 'Prestação', 'Plano de Saúde', 'Parcela do Carro', 'IPVA', 'Seguro', 'Assinaturas'];
        const isDefaultFixed = (itemName) => DEFAULT_FIXED_ITEMS.some(keyword => itemName.toLowerCase().includes(keyword.toLowerCase()));

        function generateEmptyYearData() {
            let data = {};
            MONTHS.forEach(m => {
                data[m] = { 
                    goals: { 
                        fixed: { label: 'Contas Fixas', value: 50, color: 'blue' }, 
                        variable: { label: 'Despesas Variáveis', value: 30, color: 'pink' }, 
                        investment: { label: 'Investimentos', value: 20, color: 'emerald' } 
                    }, 
                    itemMetadata: {}, 
                    categoriesMetadata: { ...DEFAULT_METADATA } 
                };
                Object.keys(CATEGORIES_CONFIG).forEach(cat => {
                    data[m][cat] = {};
                    data[m].itemMetadata[cat] = {};
                    CATEGORIES_CONFIG[cat].items.forEach(item => {
                        data[m][cat][item] = 0;
                        if (CATEGORIES_CONFIG[cat].type === 'investment') {
                            data[m].itemMetadata[cat][item] = item.toLowerCase().includes('reserva') ? 'reserva' : item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel';
                        } else {
                            data[m].itemMetadata[cat][item] = isDefaultFixed(item) ? 'fixed' : 'variable';
                        }
                    });
                });
            });
            return data;
        }

        function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
        function safeId(str) { return str.toString().replace(/[^a-z0-9]/gi, '-').toLowerCase(); }

        // --- ESTADO GLOBAL DA APLICAÇÃO ---
        const currentYearString = new Date().getFullYear().toString();
        
        const AppState = {
            user: null,
            budgetData: { [currentYearString]: generateEmptyYearData() },
            currentYear: currentYearString,
            currentMonthIdx: new Date().getMonth(),
            activeTab: 'dashboard',
            loading: true,
            saving: false,
            errorMsg: null,
            confirmMonthChange: null,
            charts: {}, 
            get currentMonth() { return MONTHS[this.currentMonthIdx]; },
            get currentData() { return this.budgetData[this.currentYear][this.currentMonth]; }
        };

        // --- FUNÇÕES UTILITÁRIAS ---
        function formatCurrency(value) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0); }
        function parseCurrencyString(val) { const raw = String(val).replace(/\D/g, ''); return raw ? Number(raw) / 100 : 0; }
        function formatCurrencyInput(val) { const num = Number(val); if (isNaN(num)) return '0,00'; return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num); }
        function getCategoryIconAndColor(catName) { if (CATEGORIES_CONFIG[catName]) return { ...CATEGORIES_CONFIG[catName], color: 'text-slate-600', bg: 'bg-slate-100' }; return { icon: 'Receipt', color: 'text-slate-600', bg: 'bg-slate-100', type: 'expense' }; }
        function getCategoryTotal(year, month, category) { if (!AppState.budgetData[year] || !AppState.budgetData[year][month] || !AppState.budgetData[year][month][category]) return 0; return Object.values(AppState.budgetData[year][month][category]).reduce((acc, val) => acc + (Number(val) || 0), 0); }

        // --- CÁLCULOS E MÉTRICAS ---
        function calculateMetrics() {
            const calcMonth = (y, m) => {
                let renda = 0, gastos = 0, fixos = 0, variaveis = 0, investimentos = 0, reservaAtual = 0;
                if(!AppState.budgetData[y] || !AppState.budgetData[y][m]) return { renda, gastos, saldo: 0, fixos, variaveis, investimentos, reservaAtual };

                Object.keys(AppState.budgetData[y][m]).forEach(cat => {
                    if (['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) return;
                    const config = CATEGORIES_CONFIG[cat] || { type: 'expense' };
                    const catMetaType = AppState.budgetData[y][m].categoriesMetadata?.[cat] || config.type || 'expense';

                    if (catMetaType === 'income' || cat === 'Renda Familiar') {
                        renda += getCategoryTotal(y, m, cat);
                    } else if (catMetaType === 'investment' || cat === 'Investimento') {
                        Object.entries(AppState.budgetData[y][m][cat]).forEach(([item, val]) => {
                            const numVal = Number(val) || 0;
                            const type = AppState.budgetData[y][m].itemMetadata?.[cat]?.[item] || (item.toLowerCase().includes('reserva') ? 'reserva' : item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel');
                            if(type === 'reserva') reservaAtual += numVal;
                            else investimentos += numVal;
                        });
                    } else {
                        Object.entries(AppState.budgetData[y][m][cat]).forEach(([item, val]) => {
                            const numVal = Number(val) || 0;
                            gastos += numVal;
                            const type = AppState.budgetData[y][m].itemMetadata?.[cat]?.[item] || 'variable';
                            if (type === 'fixed') fixos += numVal; else variaveis += numVal;
                        });
                    }
                });
                return { renda, gastos, saldo: renda - (gastos + investimentos + reservaAtual), fixos, variaveis, investimentos, reservaAtual };
            };

            const current = calcMonth(AppState.currentYear, AppState.currentMonth);
            let acumulado = 0, reservaTotalAcumulada = 0;
            const historyList = [];

            for (let i = 0; i < 12; i++) {
                const mData = calcMonth(AppState.currentYear, MONTHS[i]);
                acumulado += mData.saldo;
                reservaTotalAcumulada += mData.reservaAtual;
                historyList.push({ month: MONTHS[i], renda: mData.renda, gastos: mData.gastos, investido: mData.investimentos + mData.reservaAtual, saldo: mData.saldo });
            }

            const custoDeVida = current.fixos;
            return {
                totals: { ...current, acumulado },
                metrics: { custoDeVida, metaReserva6m: custoDeVida * 6, metaReserva12m: custoDeVida * 12, reservaTotalAcumulada },
                historyData: historyList
            };
        }

        // --- BANCO DE DADOS (SUPABASE) ---
        function updateSyncUI() {
            const headerDesk = document.getElementById('sync-status-desktop');
            const headerMob = document.getElementById('sync-status-mobile');
            let statusHTML = '';
            if (AppState.errorMsg) statusHTML = `<span class="flex items-center gap-1 text-rose-500"><i data-lucide="alert-circle" class="w-4 h-4"></i> <span class="hidden lg:inline">${AppState.errorMsg}</span></span>`;
            else if (AppState.saving) statusHTML = `<span class="flex items-center gap-1 text-slate-500"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span class="hidden lg:inline">Salvando...</span></span>`;
            else statusHTML = `<span class="flex items-center gap-1 text-emerald-600"><i data-lucide="save" class="w-4 h-4"></i> <span class="hidden lg:inline">Sincronizado</span></span>`;
            
            if (headerDesk) headerDesk.innerHTML = statusHTML;
            if (headerMob) headerMob.innerHTML = statusHTML;
            lucide.createIcons();
        }

        function mergeServerData(serverData) {
            // Anti-crash para dados antigos do V1 (se tiver array de incomes, bills, ignora e usa o vazio novo)
            if (!serverData || typeof serverData !== 'object' || serverData.incomes || serverData.bills) {
                return deepClone(AppState.budgetData);
            }

            let parsedData = serverData;
            if (parsedData['Janeiro'] && !parsedData[currentYearString]) {
                parsedData = { [currentYearString]: parsedData };
            }
            
            let newData = deepClone(AppState.budgetData);
            
            Object.keys(parsedData).forEach(year => {
                if (!newData[year]) newData[year] = generateEmptyYearData();
                
                Object.keys(parsedData[year]).forEach(m => {
                    if (newData[year][m]) {
                        if (parsedData[year][m].goals) {
                            if (typeof parsedData[year][m].goals.fixed === 'number') {
                                newData[year][m].goals = {
                                    fixed: { label: 'Contas Fixas', value: parsedData[year][m].goals.fixed || 0, color: 'blue' },
                                    variable: { label: 'Despesas Variáveis', value: parsedData[year][m].goals.variable || 0, color: 'pink' },
                                    investment: { label: 'Investimentos', value: parsedData[year][m].goals.investment || 0, color: 'emerald' }
                                };
                            } else {
                                newData[year][m].goals = parsedData[year][m].goals;
                            }
                        }

                        Object.keys(newData[year][m]).forEach(k => { if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(k)) delete newData[year][m][k]; });
                        if (!newData[year][m].itemMetadata) newData[year][m].itemMetadata = {};
                        
                        newData[year][m].categoriesMetadata = parsedData[year][m].categoriesMetadata || { ...DEFAULT_METADATA };
                        Object.keys(newData[year][m].categoriesMetadata).forEach(cat => {
                            if (['fixed', 'variable', 'tithe'].includes(newData[year][m].categoriesMetadata[cat])) newData[year][m].categoriesMetadata[cat] = 'expense';
                        });

                        Object.keys(parsedData[year][m]).forEach(cat => {
                            if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) {
                                newData[year][m][cat] = {};
                                if (!newData[year][m].itemMetadata[cat]) newData[year][m].itemMetadata[cat] = {};
                                
                                Object.keys(parsedData[year][m][cat]).forEach(item => {
                                    newData[year][m][cat][item] = parsedData[year][m][cat][item];
                                    if (parsedData[year][m].itemMetadata?.[cat]?.[item]) {
                                        newData[year][m].itemMetadata[cat][item] = parsedData[year][m].itemMetadata[cat][item];
                                    } else {
                                        const catConfig = CATEGORIES_CONFIG[cat];
                                        if (catConfig?.type === 'investment') newData[year][m].itemMetadata[cat][item] = item.toLowerCase().includes('reserva') ? 'reserva' : item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel';
                                        else newData[year][m].itemMetadata[cat][item] = isDefaultFixed(item) ? 'fixed' : 'variable';
                                    }
                                    if (parsedData[year][m].itemMetadata?.[cat]?.[`${item}_inst`] !== undefined) newData[year][m].itemMetadata[cat][`${item}_inst`] = parsedData[year][m].itemMetadata[cat][`${item}_inst`];
                                });
                            }
                        });
                    }
                });
            });
            return newData;
        }

        async function saveToDatabase() {
            AppState.saving = true;
            AppState.errorMsg = null;
            updateSyncUI();
            
            try {
                if (!AppState.user) return;
                
                const { error } = await supabaseClient
                    .from('dados_financeiros')
                    .upsert({ 
                        id: AppState.user.id, 
                        payload: AppState.budgetData,
                        updated_at: new Date()
                    });

                if (error) throw error;
            } catch (error) {
                console.error("Save error:", error);
                AppState.errorMsg = "Falha ao salvar. Nuvem indisponível.";
            } finally {
                AppState.saving = false;
                updateSyncUI();
            }
        }

        async function loadDatabaseData() {
            try {
                if (!AppState.user) return;
                
                const { data, error } = await supabaseClient
                    .from('dados_financeiros')
                    .select('payload')
                    .eq('id', AppState.user.id)
                    .single();

                if (data && data.payload) {
                    AppState.budgetData = mergeServerData(data.payload);
                }
            } catch (error) {
                console.error("DB Error Load:", error);
            } finally {
                AppState.loading = false;
                renderApp();
            }
        }

        // --- AÇÕES DO USUÁRIO & DEBOUNCE ---
        let typingTimer;

        window.AppActions = {
            sair: async () => {
                await supabaseClient.auth.signOut();
                localStorage.removeItem("logado");
                window.location.href = "login.html";
            },

            changeTab: (tabId) => { AppState.activeTab = tabId; renderApp(); },
            
            changeYear: (delta) => {
                const newYearStr = (parseInt(AppState.currentYear) + delta).toString();
                if (!AppState.budgetData[newYearStr]) {
                    AppState.budgetData[newYearStr] = generateEmptyYearData();
                    saveToDatabase();
                }
                AppState.currentYear = newYearStr;
                renderApp();
            },
            
            prevMonth: () => { if (AppState.currentMonthIdx > 0) { AppState.currentMonthIdx--; renderApp(); } },
            nextMonthConfirm: () => { 
                if (AppState.currentMonthIdx < 11) {
                    AppState.confirmMonthChange = AppState.currentMonthIdx + 1;
                    renderModal();
                }
            },
            closeModal: () => { AppState.confirmMonthChange = null; renderModal(); },
            confirmMonthChange: () => { AppState.currentMonthIdx = AppState.confirmMonthChange; AppState.confirmMonthChange = null; renderApp(); },
            
            handleInputDebounced: (year, month, category, item, inputEl) => {
                const rawDigits = inputEl.value.replace(/\D/g, '');
                if (!rawDigits) { inputEl.value = '0,00'; } 
                else { inputEl.value = formatCurrencyInput(Number(rawDigits) / 100); }
                
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    const numValue = parseCurrencyString(inputEl.value);
                    if (AppState.budgetData[year][month][category][item] !== numValue) {
                        AppState.budgetData[year][month][category][item] = numValue;
                        saveToDatabase();
                        renderApp();
                    }
                }, 1000);
            },

            handleBlur: (year, month, category, item, inputEl) => {
                clearTimeout(typingTimer);
                const numValue = parseCurrencyString(inputEl.value);
                inputEl.value = formatCurrencyInput(numValue);
                if (AppState.budgetData[year][month][category][item] !== numValue) {
                    AppState.budgetData[year][month][category][item] = numValue;
                    saveToDatabase();
                    renderApp();
                }
            },

            handleGoalInput: (id, val, renda) => {
                const numVal = parseInt(val) || 0;
                const percentEl = document.getElementById(`goal-val-${id}`);
                if(percentEl) percentEl.innerText = numVal + '%';
                
                const plannedVal = (numVal / 100) * Number(renda);
                const planValEl = document.getElementById(`plan-val-${id}`);
                if(planValEl) planValEl.innerText = formatCurrency(plannedVal);

                let total = 0;
                document.querySelectorAll('.goal-slider').forEach(s => total += parseInt(s.value) || 0);

                const isExc = total > 100;
                const totalText = document.getElementById('plan-total-text');
                if(totalText) {
                    totalText.innerText = total + '%';
                    totalText.className = isExc ? 'text-rose-500 font-bold' : 'text-blue-600 font-bold';
                }
                
                const totalBar = document.getElementById('plan-total-bar');
                if(totalBar) {
                    totalBar.style.width = Math.min(100, total) + '%';
                    totalBar.className = `h-full transition-all ${isExc ? 'bg-rose-500' : 'bg-blue-500'}`;
                }
                
                const excMsg = document.getElementById('plan-exc-msg');
                if(excMsg) excMsg.style.display = isExc ? 'block' : 'none';
            },

            handleGoalChange: (year, month, id, val) => {
                const numValue = parseInt(val) || 0;
                if (!AppState.budgetData[year][month].goals) return;
                AppState.budgetData[year][month].goals[id].value = numValue;
                saveToDatabase();
                renderApp();
            },

            addGoal: (year, month) => {
                const newId = 'custom_' + Date.now();
                const colorAssigned = DYNAMIC_COLORS[Object.keys(AppState.budgetData[year][month].goals).length % DYNAMIC_COLORS.length];
                AppState.budgetData[year][month].goals[newId] = { label: 'Novo Objetivo', value: 0, color: colorAssigned };
                saveToDatabase(); renderApp();
            },
            removeGoal: (year, month, id) => { delete AppState.budgetData[year][month].goals[id]; saveToDatabase(); renderApp(); },
            renameGoal: (year, month, id, inputEl) => {
                const newLabel = inputEl.value.trim() || 'Objetivo';
                AppState.budgetData[year][month].goals[id].label = newLabel;
                saveToDatabase(); renderApp();
            },
            
            handleTypeChange: (year, month, category, item, newType) => {
                if (!AppState.budgetData[year][month].itemMetadata[category]) AppState.budgetData[year][month].itemMetadata[category] = {};
                AppState.budgetData[year][month].itemMetadata[category][item] = newType;
                saveToDatabase(); renderApp();
            },
            handleInstChange: (year, month, category, item, instName) => {
                if (!AppState.budgetData[year][month].itemMetadata[category]) AppState.budgetData[year][month].itemMetadata[category] = {};
                AppState.budgetData[year][month].itemMetadata[category][`${item}_inst`] = instName.trim();
                saveToDatabase();
            },

            copyFromPreviousMonth: () => {
                let prevMonthIdx = AppState.currentMonthIdx - 1;
                let prevYear = AppState.currentYear;
                if (prevMonthIdx < 0) { prevMonthIdx = 11; prevYear = (parseInt(AppState.currentYear) - 1).toString(); }
                if (!AppState.budgetData[prevYear] || !AppState.budgetData[prevYear][MONTHS[prevMonthIdx]]) return;
                
                const prevData = AppState.budgetData[prevYear][MONTHS[prevMonthIdx]];
                AppState.budgetData[AppState.currentYear][AppState.currentMonth] = deepClone(prevData);
                saveToDatabase(); renderApp();
            },

            addCategory: (year, month) => {
                let name = 'Nova Categoria', counter = 1;
                while (AppState.budgetData[year][month][name] !== undefined) { name = `Nova Categoria ${counter}`; counter++; }
                AppState.budgetData[year][month][name] = {};
                if (!AppState.budgetData[year][month].itemMetadata[name]) AppState.budgetData[year][month].itemMetadata[name] = {};
                AppState.budgetData[year][month].categoriesMetadata[name] = 'expense';
                saveToDatabase(); renderApp();
            },
            renameCategory: (year, month, oldName, inputEl) => {
                const newName = inputEl.value.trim();
                if (oldName === newName || newName === '' || AppState.budgetData[year][month][newName] !== undefined) { inputEl.value = oldName; return; }
                
                AppState.budgetData[year][month][newName] = AppState.budgetData[year][month][oldName];
                delete AppState.budgetData[year][month][oldName];
                
                if (AppState.budgetData[year][month].itemMetadata[oldName]) {
                    AppState.budgetData[year][month].itemMetadata[newName] = AppState.budgetData[year][month].itemMetadata[oldName];
                    delete AppState.budgetData[year][month].itemMetadata[oldName];
                }
                if (AppState.budgetData[year][month].categoriesMetadata[oldName]) {
                    AppState.budgetData[year][month].categoriesMetadata[newName] = AppState.budgetData[year][month].categoriesMetadata[oldName];
                    delete AppState.budgetData[year][month].categoriesMetadata[oldName];
                }
                saveToDatabase(); renderApp();
            },
            deleteCategory: (year, month, catName) => {
                delete AppState.budgetData[year][month][catName];
                delete AppState.budgetData[year][month].itemMetadata[catName];
                delete AppState.budgetData[year][month].categoriesMetadata[catName];
                saveToDatabase(); renderApp();
            },

            addItem: (year, month, categoryName, defaultName = 'Nova Conta', defaultType = 'auto') => {
                if (!AppState.budgetData[year][month][categoryName]) {
                    AppState.budgetData[year][month][categoryName] = {};
                    AppState.budgetData[year][month].categoriesMetadata[categoryName] = categoryName === 'Investimento' ? 'investment' : categoryName === 'Renda Familiar' ? 'income' : 'expense';
                }
                let name = defaultName, counter = 1;
                while (AppState.budgetData[year][month][categoryName][name] !== undefined) { name = `${defaultName} ${counter}`; counter++; }
                
                AppState.budgetData[year][month][categoryName][name] = 0;
                if (!AppState.budgetData[year][month].itemMetadata[categoryName]) AppState.budgetData[year][month].itemMetadata[categoryName] = {};
                
                const catMetaType = AppState.budgetData[year][month].categoriesMetadata[categoryName] || CATEGORIES_CONFIG[categoryName]?.type || 'expense';
                if(defaultType === 'auto') {
                    AppState.budgetData[year][month].itemMetadata[categoryName][name] = catMetaType === 'investment' ? 'variavel' : (isDefaultFixed(name) ? 'fixed' : 'variable');
                } else {
                    AppState.budgetData[year][month].itemMetadata[categoryName][name] = defaultType;
                }
                saveToDatabase(); renderApp();
            },
            renameItem: (year, month, categoryName, oldName, inputEl) => {
                const newName = inputEl.value.trim();
                if (oldName === newName || newName === '') { inputEl.value = oldName; return; }
                
                let finalName = newName, counter = 1;
                const items = AppState.budgetData[year][month][categoryName];
                while (items[finalName] !== undefined && finalName !== oldName) { finalName = `${newName} ${counter}`; counter++; }

                items[finalName] = items[oldName]; delete items[oldName];
                if (AppState.budgetData[year][month].itemMetadata[categoryName]) {
                    AppState.budgetData[year][month].itemMetadata[categoryName][finalName] = AppState.budgetData[year][month].itemMetadata[categoryName][oldName];
                    delete AppState.budgetData[year][month].itemMetadata[categoryName][oldName];
                    
                    if (AppState.budgetData[year][month].itemMetadata[categoryName][`${oldName}_inst`] !== undefined) {
                        AppState.budgetData[year][month].itemMetadata[categoryName][`${finalName}_inst`] = AppState.budgetData[year][month].itemMetadata[categoryName][`${oldName}_inst`];
                        delete AppState.budgetData[year][month].itemMetadata[categoryName][`${oldName}_inst`];
                    }
                }
                saveToDatabase(); renderApp();
            },
            deleteItem: (year, month, categoryName, itemName) => {
                delete AppState.budgetData[year][month][categoryName][itemName];
                if (AppState.budgetData[year][month].itemMetadata[categoryName]) {
                    delete AppState.budgetData[year][month].itemMetadata[categoryName][itemName];
                    delete AppState.budgetData[year][month].itemMetadata[categoryName][`${itemName}_inst`];
                }
                saveToDatabase(); renderApp();
            }
        };

        function renderDashboard() {

            const catGastos = Object.keys(AppState.currentData).filter(cat => !['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat) && (AppState.currentData.categoriesMetadata?.[cat] || CATEGORIES_CONFIG[cat]?.type || 'expense') === 'expense').map(cat => ({ name: cat, value: getCategoryTotal(AppState.currentYear, AppState.currentMonth, cat) })).filter(d => d.value > 0).sort((a, b) => b.value - a.value);
            const fixoVar = [{ name: 'Contas Fixas', value: totals.fixos }, { name: 'Despesas Variáveis', value: totals.variaveis }].filter(d => d.value > 0);
            const incomeData = [], ccData = [], investData = [];

            Object.keys(AppState.currentData).forEach(cat => {
                if (['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) return;
                const items = Object.entries(AppState.currentData[cat]).map(([n, v]) => ({name: n, value: Number(v)}));
                if (meta[cat] === 'income' || cat === 'Renda Familiar') incomeData.push(...items);
                if (cat.toLowerCase().includes('cartão') || cat.toLowerCase().includes('cartao')) ccData.push(...items);
                if (meta[cat] === 'investment' || cat === 'Investimento') investData.push(...items);

tData), COLORS_INVEST, 'pie')}</div></div>`;

        function renderPlanejamento() {
            const { totals } = calculateMetrics(); const y = AppState.currentYear; const m = AppState.currentMonth;

            let totalGoal = 0; goalEntries.forEach(([id, g]) => totalGoal += Number(g.value));
            const isExc = totalGoal > 100;

            const chartColors = chartData.map(d => d.hex);

            setTimeout(() => { if(chartData.length>0) createPieChart('chart-plan', chartData, chartColors, 'doughnut'); }, 0);

            const alertCard = (title, actual, planned) => {
                const isOk = actual <= planned; const p = planned>0 ? (actual/planned)*100 : 0;

            }).join('');

            return `<div class="grid grid-cols-1 lg:grid-cols-12 gap-6"><div class="lg:col-span-5 space-y-6"><div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200"><h3 class="font-bold text-slate-800 uppercase text-xs md:text-sm tracking-wide mb-6">Definição de Metas (%)</h3><div>${slidersHTML}</div><button onclick="AppActions.addGoal('${y}', '${m}')" class="mt-2 w-full border border-dashed border-slate-300 text-slate-500 hover:bg-slate-50 hover:text-blue-600 font-bold text-xs py-2 rounded-xl flex justify-center items-center gap-1 transition-colors"><i data-lucide="plus" class="w-3 h-3"></i> Adicionar Novo Objetivo</button><div class="mt-8 pt-6 border-t border-slate-100"><div class="flex justify-between text-[10px] md:text-xs font-bold text-slate-500 mb-2 uppercase"><span>Uso do Orçamento</span><span id="plan-total-text" class="${isExc?'text-rose-500':'text-blue-600'}">${totalGoal}%</span></div><div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden"><div id="plan-total-bar" class="h-full transition-all ${isExc?'bg-rose-500':'bg-blue-500'}" style="width: ${Math.min(100, totalGoal)}%"></div></div><p id="plan-exc-msg" class="text-xs text-rose-500 mt-2 text-center" style="display: ${isExc ? 'block' : 'none'}">A soma das metas não deve exceder 100%.</p></div></div></div><div class="lg:col-span-7 space-y-6"><div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200"><h3 class="font-bold text-slate-800 uppercase text-xs md:text-sm tracking-wide text-center mb-4">Distribuição Planejada</h3><div class="flex justify-center w-full py-4"><div class="h-56 w-56 md:h-64 md:w-64 relative"><canvas id="chart-plan"></canvas></div></div></div><div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200"><h3 class="font-bold text-slate-800 uppercase text-xs md:text-sm tracking-wide mb-4">Alertas de Categoria</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-4">${goalEntries.map(([id, g]) => { let actual = 0; if (id === 'fixed') actual = totals.fixos; else if (id === 'variable') actual = totals.variaveis; else if (id === 'investment') actual = totals.investimentos + totals.reservaAtual; else actual = getCategoryTotal(y, m, g.label); const planned = (g.value/100) * totals.renda; if (id !== 'fixed' && id !== 'variable' && id !== 'investment' && planned === 0 && actual === 0) return ''; return alertCard(g.label, actual, planned); }).join('')}</div></div></div></div>`;

a de emergência antes de ir para a bolsa.'},{t:'2. DIVERSIFICAÇÃO',d:'Divida entre Renda Fixa e Variável.'},{t:'3. FOCO NO LONGO PRAZO',d:'Serve para multiplicar patrimônio no tempo, não ficar rico rápido.'},{t:'4. ESTUDE TAXAS E IR',d:'Taxas e impostos podem "comer" boa parte da sua rentabilidade.'}].map(x=>`<div class="bg-white p-4 rounded-2xl border border-blue-50"><h4 class="font-extrabold text-blue-800 text-[10px] md:text-[11px] uppercase tracking-wide mb-1.5">${x.t}</h4><p class="text-[10px] md:text-[11px] text-slate-500">${x.d}</p></div>`).join('')}</div></div></div><div class="lg:col-span-4 space-y-6"><div class="bg-[#0f172a] rounded-3xl p-6 md:p-8 text-white shadow-xl"><div class="mb-6"><h4 class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Reserva de Emergência</h4><p class="text-2xl md:text-3xl font-black text-blue-500">${formatCurrency(totalRes)}</p></div><div class="mb-6 pt-6 border-t border-slate-800"><h4 class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Total em Investimentos</h4><p class="text-xl md:text-2xl font-black text-emerald-400">${formatCurrency(totalInv)}</p></div><div class="pt-6 border-t border-slate-800 flex justify-between items-center mt-2"><h4 class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest">Patrimônio Líquido</h4><p class="text-lg md:text-xl font-bold text-white">${formatCurrency(patLiq)}</p></div></div><div class="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200"><h3 class="font-extrabold text-blue-700 uppercase text-[10px] md:text-[11px] tracking-widest text-center mb-6">Alocação por Tipo</h3>${chartData.length>0 ? `<div class="flex justify-center w-full py-4"><div class="h-48 w-48 md:h-56 md:w-56 relative"><canvas id="chart-inv"></canvas></div></div><div class="mt-4 space-y-3">${chartData.map((d,i)=>{ const pct = ((d.value / chartData.reduce((a,b)=>a+b.value,0)) * 100).toFixed(1); return `<div clas         }

        function renderHistorico() {
            const { metrics, historyData } = calculateMetrics(); const progPct = Math.min(100, (metrics.reservaTotalAcumulada / (metrics.metaReserva12m||1)) * 100); const falta = Math.max(0, metrics.metaReserva12m - metrics.reservaTotalAcumulada);
            return `<div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start"><div class="lg:col-span-5 space-y-6"><div class="bg-white p-5 md:p-8 rounded-3xl shadow-sm border border-slate-200"><h3 class="text-[11px] md:text-[13px] font-extrabold text-blue-600 uppercase tracking-widest mb-6">Meta de Segurança</h3><div class="flex flex-col sm:flex-row gap-3 md:gap-4 mb-6 md:mb-8"><div class="flex-1 bg-slate-50 p-4 md:p-5 rounded-2xl border border-slate-100 flex flex-col justify-center"><p class="text-[9px] md:text-[10px] font-bold text-slate-500 mb-1.5 uppercase">Segurança (6 Meses)</p><p class="text-xl md:text-2xl font-black text-slate-800">${formatCurrency(metrics.metaReserva6m)}</p></div><div class="flex-1 bg-[#f0f7ff] p-4 md:p-5 rounded-2xl border border-blue-100 flex flex-col justify-center"><p class="text-[9px] md:text-[10px] font-bold text-blue-500 mb-1.5 uppercase">Ideal (12 Meses)</p><p class="text-xl md:text-2xl font-black text-blue-600">${formatCurrency(metrics.metaReserva12m)}</p></div></div><div><div class="flex justify-between items-end mb-1.5"><div><span class="text-[10px] md:text-[11px] font-extrabold text-slate-700 block uppercase tracking-widest mb-1">Progresso Atual</span><span class="text-[9px] md:text-[11px] italic text-slate-400 font-medium">${formatCurrency(metrics.reservaTotalAcumulada)} / ${formatCurrency(metrics.metaReserva12m)}</span></div><div class="text-right"><span class="text-lg md:text-xl font-black text-blue-600 block leading-none mb-1.5">${progPct.toFixed(0)}%</span><span class="text-[9px] md:text-[10px] font-extrabold text-rose-500 uppercase tracking-wider">Falta: ${formatCurrency(falta)}</span></div></div><div class="w-full bg-[#f1f5f9] rounded-xl h-10 md:h-11 mt-4 flex items-center justify-center relative overflow-hidden shadow-inner border border-slate-200/50"><div class="absolute left-0 top-0 h-full bg-blue-500 transition-all duration-1000" style="width: ${progPct}%"></div><span class="relative z-10 text-xs md:text-[13px] font-bold ${progPct>50?'text-white':'text-slate-800'}">${formatCurrency(metrics.reservaTotalAcumulada)}</span></div></div></div><div class="bg-white p-5 md:p-8 rounded-3xl shadow-sm border border-slate-200"><h3 class="text-[11px] md:text-[13px] font-extrabold text-slate-800 uppercase tracking-widest mb-6">O que é a reserva?</h3><div class="space-y-6">${[{i:'shield-check',c:'blue',t:'Para que serve?',d:'Cobre imprevistos como demissão ou saúde sem precisar de empréstimos.'},{i:'help-circle',c:'amber',t:'Quanto guardar?',d:'O ideal é ter entre 6 e 12 meses do seu custo de vida atual guardado.'},{i:'trending-up',c:'emerald',t:'Onde investir?',d:'Priorize Liquidez Diária e Baixo Risco (Tesouro Selic, CDB 100% DI).'}].map(x=>`<div class="flex gap-3 md:gap-4"><div class="w-10 h-10 md:w-12 h-12 rounded-2xl bg-${x.c}-50 flex items-center justify-center shrink-0 border border-${x.c}-100/50"><i data-lucide="${x.i}" class="w-5 h-5 md:w-6 h-6 text-${x.c}-500"></i></div><div><h4 class="font-extrabold text-slate-800 text-[11px] md:text-xs uppercase tracking-wide">${x.t}</h4><p class="text-[10px] md:text-[11px] text-slate-500 mt-1.5 leading-relaxed">${x.d}</p></div></div>`).join('')}</div></div></div><div class="lg:col-span-7"><div class="bg-white p-4 md:p-8 rounded-3xl shadow-sm border border-slate-200 h-full"><h3 class="text-[11px] md:text-[13px] font-extrabold text-slate-800 uppercase tracking-widest mb-6">Histórico em ${AppState.currentYear}</h3><div class="overflow-x-auto scrollbar-hide"><table class="w-full text-sm text-left min-w-[450px]"><thead class="text-[9px] md:text-[10px] text-slate-400 uppercase border-b border-slate-100"><tr><th class="pb-3 md:pb-4 font-bold tracking-widest">Mês</th><th class="pb-3 md:pb-4 font-bold tracking-widest">Renda</th><th class="pb-3 md:pb-4 font-bold tracking-widest">Gastos</th><th class="pb-3 md:pb-4 font-bold tracking-widest">Investido</th><th class="pb-3 md:pb-4 font-bold tracking-widest text-right">Sobrou</th></tr></thead><tbody>${historyData.map(d => `<tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50/50 transition-colors"><td class="py-3 md:py-4 font-extrabold text-slate-700 text-[10px] md:text-xs tracking-wide lowercase whitespace-nowrap">${d.month.substring(0,3)}/${AppState.currentYear}</td><td class="py-3 md:py-4 text-emerald-600 font-bold text-[10px] md:text-xs whitespace-nowrap">${formatCurrency(d.renda)}</td><td class="py-3 md:py-4 text-rose-600 font-bold text-[10px] md:text-xs whitespace-nowrap">${formatCurrency(d.gastos)}</td><td class="py-3 md:py-4 text-blue-600 font-bold text-[10px] md:text-xs whitespace-nowrap">${formatCurrency(d.investido)}</td><td class="py-3 md:py-4 text-right font-black text-xs md:text-sm whitespace-nowrap ${d.saldo>=0?'text-emerald-700':'text-rose-600'}">${formatCurrency(d.saldo)}</td></tr>`).join('')}${historyData.length===0?'<tr><td colspan="5" class="py-8 text-center text-slate-400 italic text-xs md:text-sm">Nenhum histórico disponível.</td></tr>':''}</tbody></table></div></div></div></div>`;
        }

        // --- SISTEMA DE RENDERIZAÇÃO (MAIN) ---
        function renderHeader() {
            const tabs = [ { id: 'dashboard', label: 'Dashboard' }, { id: 'renda', label: 'Renda' }, { id: 'gastos', label: 'Gastos' }, { id: 'planejamento', label: 'Planejamento' }, { id: 'investimento', label: 'Investimentos' }, { id: 'historico', label: 'Reserva e Histórico' } ];
            let statusHTML = '';
            if (AppState.errorMsg) statusHTML = `<span class="flex items-center gap-1 text-rose-500"><i data-lucide="alert-circle" class="w-4 h-4"></i> <span class="hidden lg:inline">${AppState.errorMsg}</span></span>`;
            else if (AppState.saving) statusHTML = `<span class="flex items-center gap-1 text-slate-500"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span class="hidden lg:inline">Salvando...</span></span>`;
            else statusHTML = `<span class="flex items-center gap-1 text-emerald-600"><i data-lucide="save" class="w-4 h-4"></i> <span class="hidden lg:inline">Sincronizado</span></span>`;

            return `<header class="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm"><div class="max-w-7xl mx-auto px-4 py-3 md:py-4 flex flex-col lg:flex-row justify-between items-center gap-3 md:gap-4"><div class="flex items-center justify-between w-full lg:w-auto"><div class="flex items-center gap-2"><i data-lucide="trending-up" class="w-5 h-5 md:w-6 md:h-6 text-blue-700" stroke-width="2.5"></i><h1 class="text-[16px] md:text-xl font-extrabold text-[#1e293b] tracking-tight">Lumis</h1></div><div class="flex lg:hidden items-center gap-1.5 text-[10px] font-medium" id="sync-status-mobile">${statusHTML}</div></div><div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto"><div class="flex items-center justify-between border border-slate-200 bg-slate-50 rounded-lg p-1 w-full sm:w-auto"><div class="flex items-center border-r border-slate-200 pr-1 mr-1"><button onclick="AppActions.changeYear(-1)" class="p-1.5 md:p-2 hover:bg-white rounded transition-colors"><i data-lucide="chevron-left" class="w-3 h-3 md:w-4 md:h-4"></i></button><div class="font-bold text-xs md:text-sm text-slate-700 px-1 md:px-2">${AppState.currentYear}</div><button onclick="AppActions.changeYear(1)" class="p-1.5 md:p-2 hover:bg-white rounded transition-colors"><i data-lucide="chevron-right" class="w-3 h-3 md:w-4 md:h-4"></i></button></div><div class="flex items-center"><button onclick="AppActions.prevMonth()" ${AppState.currentMonthIdx === 0 ? 'disabled' : ''} class="p-1.5 md:p-2 disabled:opacity-30 hover:bg-white rounded transition-colors"><i data-lucide="chevron-left" class="w-4 h-4"></i></button><div class="font-bold text-xs md:text-sm text-slate-700 uppercase tracking-widest px-2 md:px-4">${AppState.currentMonth}</div><button onclick="AppActions.nextMonthConfirm()" ${AppState.currentMonthIdx === 11 ? 'disabled' : ''} class="p-1.5 md:p-2 disabled:opacity-30 hover:bg-white rounded transition-colors"><i data-lucide="chevron-right" class="w-4 h-4"></i></button></div></div><div class="hidden lg:flex items-center gap-2 text-xs font-medium whitespace-nowrap px-2" id="sync-status-desktop">${statusHTML}</div><div class="flex items-center gap-2 w-full sm:w-auto"><a href="COLE_SEU_LINK_DO_PORTAL_AQUI" target="_blank" class="flex-1 sm:flex-none flex justify-center items-center gap-1.5 px-3 md:px-4 py-2 md:py-2.5 bg-[#f0f7ff] text-blue-700 border border-blue-200 rounded-lg text-xs md:text-sm font-bold hover:bg-blue-100 transition-colors"><i data-lucide="credit-card" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> Assinatura</a><button onclick="AppActions.sair()" class="flex-1 sm:flex-none flex justify-center items-center gap-1.5 px-3 md:px-4 py-2 md:py-2.5 bg-rose-50 text-rose-600 border border-rose-200 rounded-lg text-xs md:text-sm font-bold hover:bg-rose-100 transition-colors"><i data-lucide="log-out" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> Sair</button></div></div></div><div class="border-t border-slate-100 w-full overflow-x-auto scrollbar-hide"><div class="max-w-7xl mx-auto px-2 sm:px-4 flex flex-nowrap justify-start lg:justify-center gap-1 sm:gap-4 md:gap-8">${tabs.map(t => `<button onclick="AppActions.changeTab('${t.id}')" class="py-3 md:py-4 px-3 md:px-4 border-b-2 transition-colors whitespace-nowrap text-xs md:text-sm font-bold ${AppState.activeTab === t.id ? 'border-blue-500 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}">${t.label}</button>`).join('')}</div></div></header>`;
        }

        function renderModal() {
            const root = document.getElementById('modal-root');
            if (AppState.confirmMonthChange !== null) {
                root.innerHTML = `<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm px-4"><div class="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full shadow-2xl"><h3 class="text-lg md:text-xl font-bold text-slate-800 mb-2">Fechar o mês?</h3><p class="text-xs md:text-sm text-slate-500 mb-6">Tem certeza que deseja fechar <strong>${AppState.currentMonth}</strong> e ir para o mês seguinte?</p><div class="flex gap-3 justify-end"><button onclick="AppActions.closeModal()" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors">Cancelar</button><button onclick="AppActions.confirmMonthChange()" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors">Sim, fechar mês</button></div></div></div>`;
            } else { root.innerHTML = ''; }
        }

        function renderApp() {
            if (AppState.loading) return;
            const root = document.getElementById('app-root');
            const activeEl = document.activeElement;
            const focusState = (activeEl && activeEl.id) ? { id: activeEl.id, selectionStart: activeEl.selectionStart, selectionEnd: activeEl.selectionEnd } : null;

            destroyCharts();

            let contentHTML = '';
            if(AppState.activeTab === 'dashboard') contentHTML = renderDashboard();
            else if(AppState.activeTab === 'renda') contentHTML = renderRenda();
            else if(AppState.activeTab === 'gastos') contentHTML = renderGastos();
            else if(AppState.activeTab === 'investimento') contentHTML = renderInvestimento();
            else if(AppState.activeTab === 'planejamento') contentHTML = renderPlanejamento();
            else if(AppState.activeTab === 'historico') contentHTML = renderHistorico();

            root.innerHTML = `${renderHeader()}<main class="max-w-7xl mx-auto px-4 mt-6 md:mt-8">${contentHTML}</main>`;
            lucide.createIcons(); renderModal();

            if (focusState && focusState.id) {
                const el = document.getElementById(focusState.id);
                if (el) {
                    el.focus();
                    try { if (el.tagName === 'INPUT' && (el.type === 'text' || el.type === 'tel')) el.setSelectionRange(focusState.selectionStart, focusState.selectionEnd); } catch(e){} 
                }
            }
        }

        // --- INICIALIZAÇÃO DA AUTENTICAÇÃO COM SUPABASE E STRIPE ---
        async function initAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) {
                    AppActions.sair();
                    return;
                }
                
                // Validação de Assinatura (Bloqueio do App)
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('subscription_status')
                    .eq('id', user.id)
                    .single();

                if (!profile || profile.subscription_status !== 'active') {
                    alert("Acesso restrito para assinantes. Redirecionando para ativação da conta!");
                    window.location.href = `https://buy.stripe.com/test_28E4gB89g0EN075gaqcs800?client_reference_id=${user.id}`;
                    return;
                }

                AppState.user = user;
                
                // Sucesso! Busca os dados e renderiza.
                await loadDatabaseData();
                
            } catch (error) {
                console.error("Auth error:", error);
                AppState.errorMsg = "Erro na autenticação. Tente novamente.";
                AppState.loading = false;
                renderApp();
            }
        }

        // Inicia a aplicação
        initAuth();

    </script>
</body>
</html>
