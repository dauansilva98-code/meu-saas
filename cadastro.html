<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinar Premium | Organizador Financeiro Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            /* Fundo sutil e elegante idêntico ao do login */
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
        }
        
        .clean-card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05), 0 0 20px 0 rgba(255, 255, 255, 0.5) inset;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Animação das esferas de fundo bem sutis */
        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 64, 161, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(15%, 15%) scale(1.1); }
        }

        /* Estilos para animação do Toast */
        .toast-enter {
            transform: translateY(100%);
            opacity: 0;
        }
        .toast-enter-active {
            transform: translateY(0);
            opacity: 1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast-leave {
            transform: translateY(0);
            opacity: 1;
        }
        .toast-leave-active {
            transform: translateY(-100%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-[100dvh] w-full flex items-center justify-center p-4 sm:p-6 relative">
    
    <!-- Container para Notificações (Toasts) -->
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3"></div>

    <div class="blob top-0 left-0"></div>
    <div class="blob bottom-0 right-0" style="animation-direction: alternate-reverse; animation-duration: 30s;"></div>

    <!-- main wrapper com mx-auto, w-full e tamanho ideal para PC/Celular -->
    <main class="w-full max-w-[420px] mx-auto z-10 flex flex-col items-center justify-center">
        
        <div class="w-full text-center mb-6 sm:mb-8 flex flex-col items-center justify-center">
            <!-- Logo principal com mx-auto garantindo o centro exato -->
            <img src="logo.png" alt="Lumis Logo" class="w-48 sm:w-60 h-auto object-contain mx-auto">
            
            <h2 class="w-full text-center text-[12px] sm:text-[13px] font-extrabold text-[#64748b] uppercase tracking-[0.15em] relative z-10 -mt-6 sm:-mt-8">
                Organizador Financeiro
            </h2>
        </div>

        <div class="clean-card w-full p-6 sm:p-10">
            
            <!-- Título do Formulário -->
            <div class="text-center mb-6 sm:mb-8">
                <h3 class="text-xl sm:text-2xl font-extrabold text-slate-800 mb-2">Crie sua conta Premium</h3>
                <p class="text-[13px] sm:text-sm text-slate-500 font-medium">Organize suas finanças com o poder total da nossa plataforma.</p>
            </div>

            <div class="space-y-5 sm:space-y-6 w-full">
                
                <div class="input-group w-full">
                    <label for="email" class="block text-left text-[11px] font-extrabold uppercase tracking-wider text-[#64748b] mb-2">Seu melhor E-mail</label>
                    <div class="relative group w-full">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-[#0040A1] transition-colors">
                            <i data-lucide="mail" class="w-5 h-5"></i>
                        </span>
                        <input type="email" id="email" 
                            class="block w-full pl-12 pr-4 py-3.5 bg-white border-2 border-slate-100 rounded-2xl text-sm font-medium text-slate-800 focus:outline-none focus:ring-0 focus:border-[#0040A1] transition-colors placeholder:text-slate-300 placeholder:font-normal" 
                            placeholder="exemplo@email.com">
                    </div>
                </div>

                <div class="input-group w-full">
                    <label for="senha" class="block text-left text-[11px] font-extrabold uppercase tracking-wider text-[#64748b] mb-2">Crie uma Senha</label>
                    <div class="relative group w-full">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-[#0040A1] transition-colors">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        
                        <input type="password" id="senha" oninput="checarSenhas()"
                            class="block w-full pl-12 pr-12 py-3.5 bg-white border-2 border-slate-100 rounded-2xl text-sm font-medium text-slate-800 focus:outline-none focus:ring-0 focus:border-[#0040A1] transition-colors placeholder:text-slate-300 placeholder:font-normal" 
                            placeholder="••••••••">
                            
                        <button type="button" onclick="togglePassword('senha', 'eyeIcon')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-[#0040A1] cursor-pointer focus:outline-none transition-colors">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Novo campo de Confirmação de Senha -->
                <div class="input-group w-full">
                    <label for="senha_confirmacao" class="block text-left text-[11px] font-extrabold uppercase tracking-wider text-[#64748b] mb-2">Confirme a Senha</label>
                    <div class="relative group w-full">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-[#0040A1] transition-colors">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        
                        <input type="password" id="senha_confirmacao" oninput="checarSenhas()"
                            class="block w-full pl-12 pr-12 py-3.5 bg-white border-2 border-slate-100 rounded-2xl text-sm font-medium text-slate-800 focus:outline-none focus:ring-0 focus:border-[#0040A1] transition-colors placeholder:text-slate-300 placeholder:font-normal" 
                            placeholder="••••••••">
                            
                        <button type="button" onclick="togglePassword('senha_confirmacao', 'eyeIconConfirm')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-[#0040A1] cursor-pointer focus:outline-none transition-colors">
                            <svg id="eyeIconConfirm" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <!-- Aviso de erro dinâmico em vermelho (alinhado à esquerda para seguir o layout) -->
                    <p id="senhaErro" class="text-red-500 text-xs font-bold mt-2 hidden text-left pl-1 transition-all">As senhas não coincidem</p>
                </div>

                <button onclick="criarContaEPagar()" id="btnCadastro" class="w-full py-3.5 sm:py-4 mt-4 bg-gradient-to-b from-[#060A1F] to-[#0040A1] text-white rounded-2xl font-bold text-[14px] sm:text-[15px] shadow-lg shadow-[#0040A1]/30 hover:to-[#003080] hover:from-[#040714] hover:-translate-y-0.5 active:scale-95 transition-all flex items-center justify-center gap-3 group">
                    <span>Continuar para Pagamento</span>
                    <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </div>
        </div>
        
        <div class="mt-6 sm:mt-8 w-full text-center text-[12px] sm:text-[13px] text-slate-600">
            <span>Já possui uma conta?</span>
            <br>
            <a href="index.html" class="text-[#0040A1] font-bold mt-1 inline-block hover:underline transition-all">
                Fazer Login ➔
            </a>
        </div>

        <div class="mt-8 sm:mt-10 w-full text-center">
            <p class="text-[#64748b] text-[9px] sm:text-[10px] uppercase tracking-[0.2em] font-extrabold">
                © 2026 Lumis
            </p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // Inicializa ícones Lucide
      lucide.createIcons();

      // Configurações do Supabase e Stripe
      const supabaseUrl = 'https://izmdjkalwgupuehrbcxm.supabase.co';
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bWRqa2Fsd2d1cHVlaHJiY3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNDkwNTUsImV4cCI6MjA4NTgyNTA1NX0.w3FW5oORqiEjT0Xj3d3777KfE0xl2zm0ogezpfN3Gss';
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
      const LINK_DO_STRIPE = "https://buy.stripe.com/test_28E4gB89g0EN075gaqcs800";

      // Sistema Customizado de Notificação (Toast)
      function showToast(message, type = 'error') {
          const container = document.getElementById('toast-container');
          const toast = document.createElement('div');
          
          const bgColors = {
              error: 'bg-red-500',
              success: 'bg-emerald-500',
              warning: 'bg-amber-500'
          };
          
          const icons = {
              error: 'alert-circle',
              success: 'check-circle',
              warning: 'alert-triangle'
          };

          toast.className = `${bgColors[type]} text-white px-5 py-3.5 rounded-xl shadow-xl flex items-center gap-3 font-medium text-sm toast-enter w-max max-w-sm ml-auto`;
          toast.innerHTML = `
            <i data-lucide="${icons[type]}" class="w-5 h-5 flex-shrink-0"></i> 
            <span>${message}</span>
          `;
          
          container.appendChild(toast);
          lucide.createIcons();

          requestAnimationFrame(() => {
              toast.classList.remove('toast-enter');
              toast.classList.add('toast-enter-active');
          });

          setTimeout(() => {
              toast.classList.remove('toast-enter-active');
              toast.classList.add('toast-leave-active');
              setTimeout(() => {
                  toast.remove();
              }, 300);
          }, 4000);
      }

      // Alternar visualização da senha (agora aceita IDs dinâmicos para funcionar em ambos os campos)
      function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
        }
      }

      // Validação de senha em tempo real ao digitar
      function checarSenhas() {
          const senha = document.getElementById('senha').value;
          const senhaConf = document.getElementById('senha_confirmacao').value;
          const erroMsg = document.getElementById('senhaErro');
          
          if (senhaConf.length > 0 && senha !== senhaConf) {
              erroMsg.classList.remove('hidden');
          } else {
              erroMsg.classList.add('hidden');
          }
      }

      // Função de Cadastro
      async function criarContaEPagar() {
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;
        const senhaConfirmacao = document.getElementById('senha_confirmacao').value;
        const btn = document.getElementById('btnCadastro');

        if (!email || !senha || !senhaConfirmacao) {
            showToast("Por favor, preencha todos os campos para continuar.", "warning");
            return;
        }

        // Validação se as senhas coincidem
        if (senha !== senhaConfirmacao) {
            showToast("As senhas não coincidem. Verifique e tente novamente.", "error");
            return;
        }

        // Estado de Loading no botão
        const originalContent = btn.innerHTML;
        btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Criando conta...</span>`;
        btn.disabled = true;
        btn.classList.add('opacity-90', 'cursor-not-allowed');

        try {
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: senha
            });

            if (error) {
                // Tratamento específico de e-mail já existente
                if (error.message.includes("already registered") || error.message.includes("already exists")) {
                    showToast("Esse e-mail já está cadastrado. Faça login!", "warning");
                    setTimeout(() => { window.location.href = "index.html"; }, 2500);
                } else {
                    showToast("Erro ao criar conta: " + error.message, "error");
                }
                restaurarBotao();
                return;
            }

            showToast("Sucesso! Redirecionando para o pagamento...", "success");
            
            if (data?.user?.id) {
                const usuarioId = data.user.id;
                setTimeout(() => {
                    window.location.href = `${LINK_DO_STRIPE}?client_reference_id=${usuarioId}`;
                }, 1500);
            } else {
                showToast("Verifique seu e-mail para confirmar a conta!", "warning");
                restaurarBotao();
            }

        } catch (err) {
            console.error(err);
            showToast("Erro de conexão. Verifique sua internet.", "error");
            restaurarBotao();
        }

        function restaurarBotao() {
            btn.innerHTML = originalContent;
            btn.disabled = false;
            btn.classList.remove('opacity-90', 'cursor-not-allowed');
            lucide.createIcons(); // Recriar o ícone da seta
        }
      }

      // Permitir cadastro ao pressionar a tecla Enter
      document.addEventListener('keypress', (e) => { 
          if (e.key === 'Enter') criarContaEPagar(); 
      });
    </script>
</body>
</html>
